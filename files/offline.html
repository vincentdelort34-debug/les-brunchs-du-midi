<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canal Livraisons – Hors ligne</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,400&family=DM+Sans:wght@400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #faf7f2;
      color: #2a2318;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 380px; }
    .emoji { font-size: 4rem; margin-bottom: 24px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; margin-bottom: 12px; }
    h1 em { font-style: italic; color: #3d6b6b; }
    p { color: #8a7e6e; line-height: 1.7; margin-bottom: 28px; font-size: 0.95rem; }
    .whatsapp-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: #25d366; color: white; padding: 14px 24px;
      border-radius: 50px; text-decoration: none; font-weight: 500;
      font-size: 0.9rem; box-shadow: 0 4px 16px rgba(37,211,102,0.35);
      margin-bottom: 16px; transition: transform 0.2s;
    }
    .whatsapp-btn:hover { transform: translateY(-2px); }
    .retry-btn {
      display: block; margin-top: 12px; background: none; border: 1.5px solid #e8dcc8;
      padding: 10px 20px; border-radius: 8px; color: #8a7e6e; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; width: 100%;
    }
    .retry-btn:hover { background: #f5f0e8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">⚓</div>
    <h1>Pas de <em>connexion</em></h1>
    <p>
      Vous semblez être hors ligne. Pas de panique — vous pouvez tout de même
      passer commande directement par WhatsApp.
    </p>

</html>
