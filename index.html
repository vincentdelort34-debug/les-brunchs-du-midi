<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Lock &amp; Dock Delivery</title>
  <meta name="description" content="Packs apéro et petit-déjeuner livrés à quai – Canal du Midi"/>
  <meta name="theme-color" content="#2a2318"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Lock &amp; Dock Delivery"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --linen:#f5f0e8; --cream:#faf7f2; --sand:#e8dcc8;
      --olive:#5c6340; --terra:#a05c3c; --gold:#c8a050;
      --muted:#8a7e6e; --dark:#2a2318; --canal:#3d6b6b; --canal2:#5a9090;
      --white:#ffffff; --green:#27ae60; --orange:#e67e22; --red:#c0392b;
      --sh:0 2px 20px rgba(42,35,24,.08); --sh2:0 8px 40px rgba(42,35,24,.14);
      --r:12px; --fd:'Cormorant Garamond',serif; --fs:'DM Sans',sans-serif;
    }
    html,body,#root { min-height:100vh; }
    body { font-family:var(--fs); background:var(--cream); color:var(--dark);
           padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }

    .nav { position:sticky; top:0; z-index:100; background:rgba(250,247,242,.96);
           backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
           border-bottom:1px solid var(--sand); padding:0 20px; height:62px;
           display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-logo img { height:40px; width:40px; object-fit:contain; }
    .nav-logo-text { font-family:var(--fd); font-size:1.2rem; font-weight:600; letter-spacing:.02em; white-space:nowrap; color:var(--dark); }
    .nav-logo-text span { color:var(--canal); }
    .nav-tabs { display:flex; gap:3px; flex-shrink:0; }
    .nav-tab { padding:7px 13px; border-radius:8px; border:none; font-family:var(--fs);
               font-size:.78rem; font-weight:500; cursor:pointer; transition:all .2s;
               background:transparent; color:var(--muted); white-space:nowrap; }
    .nav-tab.active { background:var(--dark); color:var(--white); }
    .nav-tab:hover:not(.active) { background:var(--sand); color:var(--dark); }
    .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--red); margin-left:5px; vertical-align:middle; }

    .hero { background:linear-gradient(135deg,var(--dark) 0%,#3d3020 50%,var(--canal) 100%);
            color:var(--white); padding:64px 24px 48px; text-align:center; position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; inset:0; pointer-events:none;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23fff' fill-opacity='.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    .hero-tag { font-size:.7rem; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; font-weight:500; position:relative; }
    .hero h1 { font-family:var(--fd); font-size:clamp(2rem,5vw,3.4rem); font-weight:300; line-height:1.15; margin-bottom:18px; position:relative; }
    .hero h1 em { font-style:italic; color:var(--gold); }
    .hero p { font-size:.95rem; color:rgba(255,255,255,.7); max-width:460px; margin:0 auto 28px; line-height:1.7; position:relative; }
    .hero-cta { display:inline-flex; align-items:center; gap:10px; background:#25d366; color:var(--white);
                padding:13px 26px; border-radius:50px; font-weight:500; font-size:.88rem; text-decoration:none;
                transition:transform .2s,box-shadow .2s; box-shadow:0 4px 20px rgba(37,211,102,.4); position:relative; }
    .hero-cta:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(37,211,102,.5); }

    .page { max-width:1060px; margin:0 auto; padding:36px 18px 60px; }
    .sec-title { font-family:var(--fd); font-size:1.7rem; font-weight:400; margin-bottom:6px; }
    .sec-sub { color:var(--muted); font-size:.85rem; margin-bottom:28px; }
    .sec-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.7rem; font-weight:600; background:var(--linen); color:var(--muted); }

    .f-btn { padding:7px 15px; border-radius:50px; border:1.5px solid var(--sand); background:var(--white);
             color:var(--muted); font-size:.8rem; cursor:pointer; transition:all .2s; font-family:var(--fs); }
    .f-btn.active { background:var(--dark); color:var(--white); border-color:var(--dark); }
    .f-btn:hover:not(.active) { border-color:var(--muted); color:var(--dark); }
    .filter-bar { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:18px; }

    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:13px; margin-bottom:28px; }
    .stat-card { background:var(--white); border:1px solid var(--sand); border-radius:var(--r); padding:18px 20px; box-shadow:var(--sh); }
    .stat-lbl { font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:6px; }
    .stat-val { font-family:var(--fd); font-size:1.9rem; font-weight:600; line-height:1; }
    .sv-green{color:var(--green);} .sv-red{color:var(--red);} .sv-gold{color:var(--gold);}
    .sv-blue{color:var(--canal);} .sv-orange{color:var(--orange);}

    .packs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:18px; margin-bottom:48px; }
    .pack-card { background:var(--white); border-radius:var(--r); border:1px solid var(--sand);
                 overflow:hidden; box-shadow:var(--sh); transition:box-shadow .25s,transform .25s; cursor:pointer; display:flex; flex-direction:column; }
    .pack-card:hover { box-shadow:var(--sh2); transform:translateY(-3px); }
    .pack-card.sel { border-color:var(--canal); box-shadow:0 0 0 2px var(--canal2),var(--sh2); }
    .pack-hd { padding:22px 22px 14px; background:linear-gradient(135deg,var(--linen),var(--sand)); display:flex; align-items:flex-start; justify-content:space-between; }
    .pack-emoji { font-size:2.2rem; line-height:1; }
    .pack-badge { font-size:.68rem; background:var(--white); padding:4px 9px; border-radius:50px; font-weight:500; box-shadow:0 2px 8px rgba(0,0,0,.08); white-space:nowrap; }
    .pack-size { font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:600; margin-top:7px; }
    .pack-label { font-family:var(--fd); font-size:1.28rem; font-weight:500; margin:3px 0; }
    .pack-sub { font-size:.78rem; color:var(--muted); }
    .pack-body { padding:14px 22px 18px; flex:1; }
    .pack-items { list-style:none; }
    .pack-items li { font-size:.8rem; color:var(--muted); padding:3px 0; display:flex; align-items:center; gap:7px; }
    .pack-items li::before { content:'–'; color:var(--sand); flex-shrink:0; }
    .pack-ft { padding:14px 22px; border-top:1px solid var(--sand); display:flex; align-items:center; justify-content:space-between; }
    .pack-price { font-family:var(--fd); font-size:1.6rem; font-weight:600; }
    .pack-price span { font-size:.82rem; font-weight:400; color:var(--muted); font-family:var(--fs); }
    .btn-choose { padding:8px 16px; border-radius:8px; border:none; background:var(--dark); color:var(--white); font-size:.8rem; cursor:pointer; transition:all .2s; font-family:var(--fs); font-weight:500; }
    .btn-choose:hover { background:var(--olive); } .btn-choose.in { background:var(--canal); }

    .extras-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:11px; margin-top:18px; margin-bottom:48px; }
    .extra-card { background:var(--white); border:1.5px solid var(--sand); border-radius:10px; padding:13px 15px; display:flex; align-items:center; gap:11px; cursor:pointer; transition:all .2s; }
    .extra-card:hover { border-color:var(--muted); } .extra-card.sel { border-color:var(--canal); background:#f0f6f6; }
    .extra-emoji { font-size:1.35rem; }
    .extra-lbl { font-size:.82rem; font-weight:500; } .extra-prc { font-size:.76rem; color:var(--muted); }
    .extra-chk { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--sand); display:flex; align-items:center; justify-content:center; font-size:.65rem; transition:all .2s; flex-shrink:0; margin-left:auto; }
    .extra-card.sel .extra-chk { background:var(--canal); border-color:var(--canal); color:#fff; }

    .order-panel { background:var(--white); border-radius:var(--r); border:1px solid var(--sand); padding:28px; box-shadow:var(--sh); margin-bottom:40px; }
    .order-line { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--linen); font-size:.86rem; }
    .order-line:last-child { border-bottom:none; }
    .order-total { font-family:var(--fd); font-size:1.55rem; font-weight:600; display:flex; justify-content:space-between; margin-top:10px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    .form-grp { display:flex; flex-direction:column; gap:5px; }
    .form-lbl { font-size:.72rem; font-weight:500; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; }
    .form-ctrl { padding:10px 13px; border:1.5px solid var(--sand); border-radius:8px; font-family:var(--fs); font-size:.86rem; background:var(--cream); color:var(--dark); transition:border-color .2s; outline:none; width:100%; -webkit-appearance:none; appearance:none; }
    .form-ctrl:focus { border-color:var(--canal); }
    textarea.form-ctrl { resize:vertical; min-height:72px; }
    .btn-wa { width:100%; padding:15px; border-radius:10px; border:none; background:#25d366; color:var(--white); font-size:.95rem; font-weight:600; cursor:pointer; transition:all .2s; font-family:var(--fs); display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 4px 16px rgba(37,211,102,.3); margin-top:18px; text-decoration:none; }
    .btn-wa:hover { background:#1ebd5a; transform:translateY(-1px); }
    .btn-wa:disabled { background:var(--sand); color:var(--muted); cursor:not-allowed; transform:none; box-shadow:none; pointer-events:none; }
    .notice { text-align:center; font-size:.78rem; margin-top:9px; }
    .notice.warn { color:var(--terra); } .notice.info { color:var(--muted); }

    .orders-table { background:var(--white); border-radius:var(--r); border:1px solid var(--sand); overflow:hidden; box-shadow:var(--sh); margin-bottom:28px; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--linen); border-bottom:1px solid var(--sand); }
    thead th { padding:13px 15px; text-align:left; font-size:.68rem; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); font-weight:600; white-space:nowrap; }
    tbody tr { border-bottom:1px solid var(--linen); transition:background .15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--cream); }
    tbody td { padding:12px 15px; font-size:.84rem; vertical-align:middle; }
    .ord-id { font-family:var(--fd); font-weight:600; color:var(--canal); }
    .sbadge { display:inline-block; padding:3px 9px; border-radius:50px; font-size:.7rem; font-weight:600; white-space:nowrap; }
    .s-new{background:#fef3c7;color:#92400e;} .s-confirmed{background:#d1fae5;color:#065f46;}
    .s-delivered{background:#e0e7ff;color:#3730a3;} .s-cancelled{background:#fee2e2;color:#991b1b;}
    .act-btn { padding:5px 9px; border-radius:6px; border:1.5px solid var(--sand); background:transparent; font-size:.73rem; cursor:pointer; transition:all .2s; font-family:var(--fs); white-space:nowrap; text-decoration:none; display:inline-block; }
    .act-btn:hover { background:var(--linen); }
    .act-btn.ok { border-color:#7a8455; color:var(--olive); } .act-btn.ok:hover { background:#f0f4e8; }
    .act-btn.del { color:var(--red); border-color:#fca5a5; }
    .act-btn.wa  { color:#25d366; border-color:#86efac; }
    .acts { display:flex; gap:5px; flex-wrap:wrap; }

    .tournees { display:grid; grid-template-columns:repeat(auto-fill,minmax(265px,1fr)); gap:14px; margin-bottom:32px; }
    .tournee-card { background:var(--white); border:1px solid var(--sand); border-radius:var(--r); padding:18px; box-shadow:var(--sh); }
    .tournee-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .tournee-lbl { font-family:var(--fd); font-size:1.1rem; font-weight:500; }
    .tournee-cnt { background:var(--canal); color:#fff; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:600; }
    .tournee-row { font-size:.78rem; color:var(--muted); padding:2px 0; display:flex; gap:6px; flex-wrap:wrap; }
    .tournee-row::before { content:'→'; color:var(--sand); }
    .tournee-ttl { margin-top:10px; font-size:.78rem; color:var(--canal); font-weight:500; }
    .new-form { background:var(--white); border:1px solid var(--sand); border-radius:var(--r); padding:24px; box-shadow:var(--sh); }
    .form-title { font-family:var(--fd); font-size:1.35rem; font-weight:500; margin-bottom:18px; }
    .btn-dark { padding:10px 22px; border-radius:8px; border:none; background:var(--dark); color:var(--white); font-weight:500; font-size:.86rem; cursor:pointer; transition:all .2s; font-family:var(--fs); width:100%; }
    .btn-dark:hover { background:var(--olive); }
    .bo-date { font-size:.78rem; color:var(--muted); background:var(--linen); padding:5px 13px; border-radius:7px; }

    .mv-form { background:var(--white); border:1px solid var(--sand); border-radius:var(--r); padding:22px 24px; box-shadow:var(--sh); margin-bottom:28px; }
    .mv-grid { display:grid; grid-template-columns:2fr 1fr 1fr auto; gap:11px; align-items:end; }
    .type-toggle { display:flex; border-radius:8px; overflow:hidden; border:1.5px solid var(--sand); }
    .type-btn { flex:1; padding:9px 10px; border:none; cursor:pointer; font-family:var(--fs); font-size:.8rem; font-weight:500; background:var(--cream); color:var(--muted); transition:all .2s; }
    .type-btn.ai { background:var(--green); color:white; } .type-btn.ao { background:var(--red); color:white; }
    .qty-ctrl { display:flex; align-items:center; gap:6px; }
    .qty-btn { width:27px; height:27px; border-radius:6px; border:1.5px solid var(--sand); background:transparent; font-size:.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; font-weight:700; line-height:1; }
    .qbp { border-color:#86efac; color:var(--green); } .qbp:hover { background:#d4f5e2; }
    .qbm { border-color:#fca5a5; color:var(--red);   } .qbm:hover { background:#fee2e2; }
    .qty-num { font-family:var(--fd); font-size:1.3rem; font-weight:600; min-width:30px; text-align:center; }
    .qok{color:var(--green);} .qwarn{color:var(--orange);} .qdanger{color:var(--red);}
    .sb-ok{background:#d4f5e2;color:#1a6b3c;} .sb-warn{background:#fde8c8;color:#8b4500;} .sb-danger{background:#fdd5d2;color:#8b1a1a;}
    .btn-sm { padding:6px 11px; border-radius:7px; border:1.5px solid var(--sand); background:transparent; font-size:.75rem; cursor:pointer; transition:all .2s; font-family:var(--fs); }
    .btn-sm:hover { background:var(--linen); }
    .btn-sm.d { border-color:#fca5a5; color:var(--red); } .btn-sm.d:hover { background:#fee2e2; }
    .btn-export { padding:7px 15px; border-radius:8px; border:1.5px solid var(--sand); background:transparent; color:var(--muted); font-family:var(--fs); font-size:.78rem; cursor:pointer; transition:all .2s; }
    .btn-export:hover { background:var(--linen); color:var(--dark); }
    .btn-dashed { padding:8px 16px; border-radius:8px; border:1.5px dashed var(--sand); background:transparent; color:var(--muted); font-family:var(--fs); font-size:.8rem; cursor:pointer; transition:all .2s; }
    .btn-dashed:hover { border-color:var(--canal); color:var(--canal); background:#f0f6f6; }
    .histo-list { background:var(--white); border:1px solid var(--sand); border-radius:var(--r); overflow:hidden; box-shadow:var(--sh); }
    .histo-row { display:flex; align-items:center; gap:12px; padding:11px 18px; border-bottom:1px solid var(--linen); font-size:.83rem; }
    .histo-row:last-child { border-bottom:none; }
    .histo-ico { font-size:1.05rem; width:26px; text-align:center; flex-shrink:0; }
    .histo-prod { font-weight:500; } .histo-date { font-size:.7rem; color:var(--muted); } .histo-note { font-style:italic; }
    .histo-qty { font-family:var(--fd); font-size:1.15rem; font-weight:600; min-width:50px; text-align:right; flex-shrink:0; }
    .hq-in{color:var(--green);} .hq-out{color:var(--red);}
    .auto-badge { font-size:.6rem; background:#e0e7ff; color:#3730a3; padding:2px 6px; border-radius:4px; font-weight:600; margin-left:5px; }

    .overlay { position:fixed; inset:0; background:rgba(42,35,24,.4); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
    .overlay.show { opacity:1; pointer-events:all; }
    .modal { background:var(--white); border-radius:16px; padding:26px; width:100%; max-width:400px; box-shadow:0 16px 48px rgba(42,35,24,.2); transform:translateY(16px); transition:transform .2s; }
    .overlay.show .modal { transform:translateY(0); }
    .modal-title { font-family:var(--fd); font-size:1.35rem; margin-bottom:18px; }
    .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .modal-btns { display:flex; gap:10px; margin-top:18px; }
    .btn-save { flex:1; padding:10px; border-radius:8px; border:none; background:var(--dark); color:white; font-family:var(--fs); font-weight:500; font-size:.88rem; cursor:pointer; transition:background .2s; }
    .btn-save:hover { background:var(--olive); }
    .btn-cancel { padding:10px 18px; border-radius:8px; border:1.5px solid var(--sand); background:transparent; color:var(--muted); font-family:var(--fs); font-size:.88rem; cursor:pointer; transition:all .2s; }
    .btn-cancel:hover { background:var(--linen); }

    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark); color:white; padding:11px 22px; border-radius:50px; font-size:.84rem; font-weight:500; z-index:300; transition:transform .3s; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.2); pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.tg { background:var(--green); } .toast.tr { background:var(--red); }

    .empty-st { text-align:center; padding:40px 20px; color:var(--muted); }
    .empty-st .ico { font-size:2.6rem; margin-bottom:8px; }

    /* ── CONFIG ── */
    .cfg-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:28px; border-bottom:1px solid var(--sand); padding-bottom:16px; }
    .cfg-tab { padding:8px 18px; border-radius:8px; border:1.5px solid var(--sand); background:var(--white); color:var(--muted); font-family:var(--fs); font-size:.82rem; cursor:pointer; transition:all .2s; }
    .cfg-tab.active { background:var(--dark); color:white; border-color:var(--dark); }
    .cfg-section { background:var(--white); border:1px solid var(--sand); border-radius:var(--r); padding:24px; box-shadow:var(--sh); margin-bottom:20px; }
    .cfg-title { font-family:var(--fd); font-size:1.25rem; font-weight:500; margin-bottom:4px; }
    .cfg-sub { font-size:.78rem; color:var(--muted); margin-bottom:18px; }
    .cfg-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    .cfg-pack-row { display:flex; align-items:center; gap:12px; padding:14px; border:1.5px solid var(--sand); border-radius:10px; margin-bottom:10px; transition:border-color .2s; }
    .cfg-pack-row:hover { border-color:var(--canal); }
    .cfg-pack-ico { font-size:1.5rem; flex-shrink:0; }
    .cfg-pack-name { font-weight:500; font-size:.88rem; }
    .cfg-pack-cat { font-size:.7rem; color:var(--muted); }
    .cfg-pack-price { font-family:var(--fd); font-size:1.25rem; font-weight:600; color:var(--canal); flex-shrink:0; }
    .cfg-pack-edit { padding:6px 13px; border-radius:7px; border:1.5px solid var(--sand); background:transparent; font-size:.75rem; cursor:pointer; font-family:var(--fs); transition:all .2s; }
    .cfg-pack-edit:hover { background:var(--linen); }
    .cfg-list-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1.5px solid var(--sand); border-radius:9px; margin-bottom:8px; background:var(--white); }
    .cfg-list-item input { flex:1; border:none; background:transparent; font-family:var(--fs); font-size:.86rem; color:var(--dark); outline:none; }
    .cfg-del-btn { width:26px; height:26px; border-radius:6px; border:1.5px solid #fca5a5; background:transparent; color:var(--red); cursor:pointer; font-size:.85rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
    .cfg-del-btn:hover { background:#fee2e2; }
    .cfg-add-btn { width:100%; padding:10px; border-radius:9px; border:1.5px dashed var(--sand); background:transparent; color:var(--muted); font-family:var(--fs); font-size:.82rem; cursor:pointer; transition:all .2s; margin-top:4px; }
    .cfg-add-btn:hover { border-color:var(--canal); color:var(--canal); background:#f0f6f6; }
    .cfg-save-btn { padding:10px 24px; border-radius:9px; border:none; background:var(--olive); color:white; font-family:var(--fs); font-weight:500; font-size:.86rem; cursor:pointer; transition:all .2s; margin-top:16px; }
    .cfg-save-btn:hover { background:var(--dark); }
    .cfg-color-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .cfg-color-lbl { font-size:.8rem; font-weight:500; width:130px; flex-shrink:0; color:var(--muted); }
    input[type=color] { width:38px; height:38px; border:2px solid var(--sand); border-radius:8px; padding:2px; cursor:pointer; background:none; flex-shrink:0; }
    .cfg-color-hex { flex:1; padding:8px 12px; border:1.5px solid var(--sand); border-radius:8px; font-family:var(--fs); font-size:.84rem; background:var(--cream); color:var(--dark); outline:none; }
    .cfg-color-hex:focus { border-color:var(--canal); }
    .live-preview { border:2px dashed var(--sand); border-radius:var(--r); padding:16px; margin-top:16px; background:var(--linen); }
    .preview-hero { border-radius:10px; padding:24px; text-align:center; color:white; margin-bottom:12px; }
    .preview-title { font-family:var(--fd); font-size:1.4rem; font-weight:300; }
    .preview-title em { font-style:italic; }


    @media(max-width:640px){
      .form-row{grid-template-columns:1fr;}
      .mv-grid{grid-template-columns:1fr 1fr;}
      .mv-grid .btn-dark{grid-column:span 2;}
      .nav-logo{font-size:1.05rem;} .nav-tab{padding:6px 8px;font-size:.72rem;}
      .hero h1{font-size:1.85rem;} .stats-grid{grid-template-columns:1fr 1fr;}
      .packs-grid{grid-template-columns:1fr;} .extras-grid{grid-template-columns:1fr 1fr;}
      thead th:nth-child(4),td:nth-child(4),thead th:nth-child(5),td:nth-child(5){display:none;}
    }
  </style>
</head>

const lsGet = (k,d) => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){return d;} };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };
const nowStr = () => new Date().toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const getStatus = (s,t) => s<=0?"danger":s<=t?"warn":"ok";
const statusLabel = s => ({ok:"✅ OK",warn:"⚠️ Bas",danger:"🔴 Rupture"})[s];

function showToast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast ${type==="green"?"tg":type==="red"?"tr":""} show`;
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ─── DÉDUCTION STOCK AUTO ─────────────────────────────────
function deductStock(order, stockState, setStockState) {
  const pack = PACKS.find(p => p.id === order.packId);
  const newProduits = stockState.produits.map(p => ({...p}));
  const newMv = [];

  const deduct = (nom, qty) => {
    const idx = newProduits.findIndex(p => p.nom === nom);
    if (idx < 0) return;
    newProduits[idx].stock = Math.max(0, newProduits[idx].stock - qty);
    newMv.push({id:Date.now()+Math.random(), produit:nom, unite:newProduits[idx].unite, type:"out", qty, note:`Auto — Cmd ${order.id} (${order.client})`, date:nowStr(), auto:true});
  };

  if (pack) Object.entries(pack.ingredients).forEach(([nom,qty]) => deduct(nom, qty));
  order.extras.forEach(lbl => {
    const e = EXTRAS.find(x => x.label === lbl);
    if (e && e.stockRef) deduct(e.stockRef, 1);
  });

  const ns = {...stockState, produits:newProduits, mouvements:[...newMv,...stockState.mouvements].slice(0,200)};
  lsSet(SK_STOCK, ns);
  setStockState(ns);

  const alerts = newProduits.filter(p => getStatus(p.stock,p.seuil)!=="ok" && newMv.find(m=>m.produit===p.nom));
  if (alerts.length) showToast(`⚠️ Stock bas : ${alerts.slice(0,2).map(p=>p.nom).join(", ")}`, "red");
  else if (newMv.length) showToast(`📦 ${newMv.length} produit${newMv.length>1?"s":""} débité${newMv.length>1?"s":""}`, "green");
}

function Stock({stockState,setStockState}) {
  const {produits,mouvements,nextId}=stockState;
  const [mvType,setMvType]=useState("in");
  const [mvProd,setMvProd]=useState("");
  const [mvQty,setMvQty]=useState(1);
  const [mvNote,setMvNote]=useState("");
  const [hFilter,setHFilter]=useState("all");
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [mf,setMf]=useState({nom:"",cat:"Boissons",unite:"bouteille",stock:0,seuil:5});

  const upd=ns=>{ lsSet(SK_STOCK,ns); setStockState(ns); };

  const addMv=()=>{
    const pid=parseInt(mvProd), qty=parseInt(mvQty);
    if(!pid||!qty||qty<1){ showToast("Sélectionnez un produit et une quantité","red"); return; }
    const prod=produits.find(p=>p.id===pid);
    const newP=produits.map(p=>p.id!==pid?p:{...p,stock:mvType==="in"?p.stock+qty:Math.max(0,p.stock-qty)});
    const newMv=[{id:Date.now(),produit:prod.nom,unite:prod.unite,type:mvType,qty,note:mvNote,date:nowStr(),auto:false},...mouvements.slice(0,199)];
    upd({...stockState,produits:newP,mouvements:newMv});
    setMvProd(""); setMvQty(1); setMvNote("");
    showToast(mvType==="in"?`▲ +${qty} ${prod.nom}`:`▼ -${qty} ${prod.nom}`,"green");
  };

  const quickAdj=(id,delta)=>{
    const prod=produits.find(p=>p.id===id);
    if(!prod) return;
    const ns=Math.max(0,prod.stock+delta);
    const newP=produits.map(p=>p.id===id?{...p,stock:ns}:p);
    const newMv=[{id:Date.now(),produit:prod.nom,unite:prod.unite,type:delta>0?"in":"out",qty:Math.abs(delta),note:"Ajustement rapide",date:nowStr(),auto:false},...mouvements.slice(0,199)];
    upd({...stockState,produits:newP,mouvements:newMv});
  };

  const openModal=(id=null)=>{
    const p=id?produits.find(x=>x.id===id):null;
    setEditId(id);
    setMf(p?{nom:p.nom,cat:p.cat,unite:p.unite,stock:p.stock,seuil:p.seuil}:{nom:"",cat:"Boissons",unite:"bouteille",stock:0,seuil:5});
    setModal(true);
  };

  const saveModal=()=>{
    if(!mf.nom) return;
    const s=parseInt(mf.stock)||0, t=parseInt(mf.seuil)||0;
    const newP=editId
      ?produits.map(p=>p.id===editId?{...p,...mf,stock:s,seuil:t}:p)
      :[...produits,{id:nextId,...mf,stock:s,seuil:t}];
    upd({...stockState,produits:newP,nextId:editId?nextId:nextId+1});
    setModal(false);
    showToast(editId?"✏️ Produit modifié":"✅ Produit ajouté","green");
  };

  const delProd=(id)=>{
    const p=produits.find(x=>x.id===id);
    if(!confirm(`Supprimer "${p.nom}" ?`)) return;
    upd({...stockState,produits:produits.filter(x=>x.id!==id)});
  };

  const exportCSV=()=>{
    const rows=[["Produit","Catégorie","Unité","Stock","Seuil","État"],...produits.map(p=>[p.nom,p.cat,p.unite,p.stock,p.seuil,statusLabel(getStatus(p.stock,p.seuil)).replace(/[✅⚠️🔴]/g,"").trim()])];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));
    a.download=`stock-canal-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const hList=(hFilter==="all"?mouvements:mouvements.filter(m=>m.type===hFilter)).slice(0,50);
  const sorted=[...produits].sort((a,b)=>{const o={danger:0,warn:1,ok:2};return o[getStatus(a.stock,a.seuil)]-o[getStatus(b.stock,b.seuil)];});
  const CATS_S=["Boissons","Épicerie","Boulangerie","Charcuterie","Fromage","Hygiène","Emballage","Autre"];
  const UNITS =["bouteille","pièce","kg","litre","sachet","pot","barquette","paquet","plaquette","flacon","lot","rouleau"];

  return (
    <div className="page">
      <div className="sec-head">
        <div>
          <div className="sec-title">Gestion des stocks</div>
          <div className="sec-sub" style={{color:produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length?"var(--red)":"var(--muted)"}}>
            {produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length>0
              ? `⚠️ ${produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length} produit(s) en alerte`
              : "✅ Tous les stocks sont OK"}
          </div>
        </div>
      </div>

      <div className="stats-grid">
        <div className="stat-card"><div className="stat-lbl">Produits</div><div className="stat-val">{produits.length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Stock OK</div><div className="stat-val sv-green">{produits.filter(p=>getStatus(p.stock,p.seuil)==="ok").length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Stock bas</div><div className="stat-val sv-orange">{produits.filter(p=>getStatus(p.stock,p.seuil)==="warn").length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Rupture</div><div className="stat-val sv-red">{produits.filter(p=>getStatus(p.stock,p.seuil)==="danger").length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Mouvements</div><div className="stat-val sv-gold">{mouvements.length}</div></div>
      </div>

      <div className="mv-form">
        <div className="sec-title" style={{marginBottom:4}}>Enregistrer un mouvement</div>
        <div className="sec-sub" style={{marginBottom:14}}>Entrée de stock ou sortie manuelle</div>
        <div className="mv-grid">
          <div className="form-grp">
            <label className="form-lbl">Produit</label>
            <select className="form-ctrl" value={mvProd} onChange={e=>setMvProd(e.target.value)}>
              <option value="">Choisir un produit…</option>
              {[...new Set(produits.map(p=>p.cat))].sort().map(cat=>(
                <optgroup key={cat} label={cat}>
                  {produits.filter(p=>p.cat===cat).map(p=><option key={p.id} value={p.id}>{p.nom} ({p.stock} {p.unite})</option>)}
                </optgroup>
              ))}
            </select>
          </div>
          <div className="form-grp"><label className="form-lbl">Quantité</label><input type="number" className="form-ctrl" min="1" value={mvQty} onChange={e=>setMvQty(e.target.value)}/></div>
          <div className="form-grp">
            <label className="form-lbl">Type</label>
            <div className="type-toggle">
              <button className={`type-btn${mvType==="in"?" ai":""}`} onClick={()=>setMvType("in")}>▲ Entrée</button>
              <button className={`type-btn${mvType==="out"?" ao":""}`} onClick={()=>setMvType("out")}>▼ Sortie</button>
            </div>
          </div>
          <button className="btn-dark" onClick={addMv}>Valider</button>
        </div>
        <div className="form-grp" style={{marginTop:11,maxWidth:380}}>
          <label className="form-lbl">Note (optionnel)</label>
          <input type="text" className="form-ctrl" placeholder="Ex: livraison Somail, réappro fournisseur…" value={mvNote} onChange={e=>setMvNote(e.target.value)}/>
        </div>
      </div>

      <div className="sec-head">
        <div className="sec-title">Stock actuel</div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-export" onClick={exportCSV}>⬇ CSV</button>
          <button className="btn-dashed" onClick={()=>openModal()}>+ Nouveau produit</button>
        </div>
      </div>
      <div className="orders-table" style={{marginBottom:28}}>
        <table>
          <thead><tr><th>Produit</th><th>Catégorie</th><th style={{textAlign:"center"}}>Stock</th><th style={{textAlign:"center"}}>Seuil</th><th>État</th><th></th></tr></thead>
          <tbody>
            {sorted.length===0
              ? <tr><td colSpan={6} style={{textAlign:"center",padding:36,color:"var(--muted)"}}>Aucun produit</td></tr>
              : sorted.map(p=>{
                  const st=getStatus(p.stock,p.seuil);
                  return (
                    <tr key={p.id}>
                      <td><div style={{fontWeight:500}}>{p.nom}</div><div style={{fontSize:".72rem",color:"var(--muted)"}}>{p.unite}</div></td>
                      <td>{p.cat}</td>
                      <td style={{textAlign:"center"}}>
                        <div className="qty-ctrl" style={{justifyContent:"center"}}>
                          <button className="qty-btn qbm" onClick={()=>quickAdj(p.id,-1)}>−</button>
                          <span className={`qty-num q${st}`}>{p.stock}</span>
                          <button className="qty-btn qbp" onClick={()=>quickAdj(p.id,+1)}>+</button>
                        </div>
                      </td>
                      <td style={{textAlign:"center",color:"var(--muted)",fontSize:".82rem"}}>{p.seuil}</td>
                      <td><span className={`sbadge sb-${st}`}>{statusLabel(st)}</span></td>
                      <td><div className="acts"><button className="btn-sm" onClick={()=>openModal(p.id)}>✏️</button><button className="btn-sm d" onClick={()=>delProd(p.id)}>✕</button></div></td>
                    </tr>
                  );
                })
            }
          </tbody>
        </table>
      </div>

      <div className="sec-head">
        <div className="sec-title">Historique</div>
        <div className="filter-bar">
          {["all","in","out"].map(f=><button key={f} className={`f-btn${hFilter===f?" active":""}`} onClick={()=>setHFilter(f)}>{{all:"Tous",in:"Entrées",out:"Sorties"}[f]}</button>)}
        </div>
      </div>
      <div className="histo-list">
        {hList.length===0
          ? <div className="empty-st">Aucun mouvement enregistré</div>
          : hList.map(m=>(
            <div className="histo-row" key={m.id}>
              <div className="histo-ico">{m.type==="in"?"📥":"📤"}</div>
              <div style={{flex:1}}>
                <div className="histo-prod">{m.produit}{m.auto&&<span className="auto-badge">AUTO</span>}</div>
                <div className="histo-date">{m.date}{m.note&&<span> · <span className="histo-note">{m.note}</span></span>}</div>
              </div>
              <div className={`histo-qty hq-${m.type}`}>{m.type==="in"?"+":"-"}{m.qty} {m.unite}</div>
            </div>
          ))
        }
      </div>

      {modal&&(
        <div className="overlay show" onClick={e=>{if(e.target.classList.contains("overlay"))setModal(false);}}>
          <div className="modal">
            <div className="modal-title">{editId?"Modifier le produit":"Nouveau produit"}</div>
            <div className="form-grp" style={{marginBottom:12}}><label className="form-lbl">Nom</label><input className="form-ctrl" placeholder="Ex: Rosé IGP 75cl" value={mf.nom} onChange={e=>setMf({...mf,nom:e.target.value})}/></div>
            <div className="modal-row" style={{marginBottom:12}}>
              <div className="form-grp"><label className="form-lbl">Catégorie</label><select className="form-ctrl" value={mf.cat} onChange={e=>setMf({...mf,cat:e.target.value})}>{CATS_S.map(c=><option key={c}>{c}</option>)}</select></div>
              <div className="form-grp"><label className="form-lbl">Unité</label><select className="form-ctrl" value={mf.unite} onChange={e=>setMf({...mf,unite:e.target.value})}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
            </div>
            <div className="modal-row">
              <div className="form-grp"><label className="form-lbl">Stock actuel</label><input type="number" className="form-ctrl" min="0" value={mf.stock} onChange={e=>setMf({...mf,stock:e.target.value})}/></div>
              <div className="form-grp"><label className="form-lbl">Seuil alerte</label><input type="number" className="form-ctrl" min="0" value={mf.seuil} onChange={e=>setMf({...mf,seuil:e.target.value})}/></div>
            </div>
            <div className="modal-btns">
              <button className="btn-cancel" onClick={()=>setModal(false)}>Annuler</button>
              <button className="btn-save"   onClick={saveModal}>Enregistrer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

//  CONFIG — PANNEAU D'ADMINISTRATION

const SK_CONFIG = "canal-config-v1";

const DEFAULT_CONFIG = {
  // Identité
  siteName:    "Lock & Dock Delivery",
  heroTitle:   "Vos saveurs",
  heroTitleEm: "livrées à bord",
  heroSub:     "Apéros, petits-déjeuners et essentiels livrés directement sur votre ponton, entre Le Somail et Béziers.",
  heroTag:     "⚓ Canal du Midi · Lock & Dock Delivery",
  // Contact
  whatsapp:    "33767891074",
  email:       "",
  minCommande: 29,
  // Couleurs
  colorDark:   "#2a2318",
  colorGold:   "#c8a050",
  colorCanal:  "#3d6b6b",
  colorOlive:  "#5c6340",
  // Packs (prix modifiables)
  packPrices: {
    "apero-s":52, "apero-m":52, "apero-l":89,
    "ptitdej-s":22, "ptitdej-m":38, "ptitdej-l":65,
    "arrivee":45, "essentiel-s":29
  },
  // Haltes & créneaux
  haltes:   ["Le Somail","Argeliers","Ventenac-en-Minervois","Paraza","Roubia","Argens-Minervois","Homps","Azille","Olonzac","Capestang","Poilhes","Montady","Nissan-lez-Enserune","Colombiers","Béziers (port)","Villeneuve-lès-Béziers"],
  creneaux: ["08h–09h","09h–10h","10h–11h","16h–17h","17h–18h","18h–19h","19h–20h"],
};

function Config() {
  const [cfg, setCfg] = useState(() => lsGet(SK_CONFIG, DEFAULT_CONFIG));
  const [tab, setTab] = useState("identite");
  const [newHalte,   setNewHalte]   = useState("");
  const [newCreneau, setNewCreneau] = useState("");

  const save = (patch) => {
    const next = {...cfg, ...patch};
    setCfg(next);
    lsSet(SK_CONFIG, next);
    // Appliquer les couleurs live
    if (patch.colorDark)  document.documentElement.style.setProperty("--dark",  patch.colorDark);
    if (patch.colorGold)  document.documentElement.style.setProperty("--gold",  patch.colorGold);
    if (patch.colorCanal) document.documentElement.style.setProperty("--canal", patch.colorCanal);
    if (patch.colorOlive) document.documentElement.style.setProperty("--olive", patch.colorOlive);
    showToast("✅ Sauvegardé", "green");
  };

  const upd = (k,v) => setCfg(c => ({...c,[k]:v}));
  const updPrice = (id,v) => setCfg(c => ({...c, packPrices:{...c.packPrices,[id]:Number(v)}}));

  const addHalte = () => {
    if (!newHalte.trim()) return;
    save({haltes:[...cfg.haltes, newHalte.trim()]});
    setNewHalte("");
  };
  const delHalte = (i) => save({haltes: cfg.haltes.filter((_,idx)=>idx!==i)});
  const editHalte = (i,v) => { const h=[...cfg.haltes]; h[i]=v; setCfg(c=>({...c,haltes:h})); };

  const addCreneau = () => {
    if (!newCreneau.trim()) return;
    save({creneaux:[...cfg.creneaux, newCreneau.trim()]});
    setNewCreneau("");
  };
  const delCreneau = (i) => save({creneaux: cfg.creneaux.filter((_,idx)=>idx!==i)});
  const editCreneau = (i,v) => { const c=[...cfg.creneaux]; c[i]=v; setCfg(s=>({...s,creneaux:c})); };

  const PACK_LABELS = {
    "apero-s":"Apéro Classique","apero-m":"Apéro Signature","apero-l":"Apéro Premium",
    "ptitdej-s":"Petit-Déj Soleil","ptitdej-m":"Petit-Déj Occitan","ptitdej-l":"Petit-Déj Festif",
    "arrivee":"Pack Arrivée","essentiel-s":"Essentiels Bord"
  };
  const PACK_ICOS = {"apero-s":"🥂","apero-m":"🍷","apero-l":"🧀","ptitdej-s":"☀️","ptitdej-m":"🥐","ptitdej-l":"🍓","arrivee":"⚓","essentiel-s":"🧴"};

  return (
    <div className="page">
      <div className="sec-head">
        <div><div className="sec-title">Panneau de configuration</div><div className="sec-sub">Modifiez votre site sans toucher au code</div></div>
      </div>

      <div className="cfg-tabs">
        {[["identite","🏷️ Identité & textes"],["contact","📬 Contact & tarifs"],["visuels","🎨 Couleurs & visuels"],["packs","📦 Prix des packs"],["haltes","📍 Haltes & créneaux"]].map(([id,lbl])=>(
          <button key={id} className={`cfg-tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>

      {/* ── IDENTITÉ ── */}
      {tab==="identite" && (
        <div className="cfg-section">
          <div className="cfg-title">Textes du site</div>
          <div className="cfg-sub">Ce que voient vos clients sur la page d&apos;accueil</div>
          <div className="cfg-grid2">
            <div className="form-grp">
              <label className="form-lbl">Nom du site (nav)</label>
              <input className="form-ctrl" value={cfg.siteName} onChange={e=>upd("siteName",e.target.value)}/>
            </div>
            <div className="form-grp">
              <label className="form-lbl">Tag line (petit texte haut)</label>
              <input className="form-ctrl" value={cfg.heroTag} onChange={e=>upd("heroTag",e.target.value)}/>
            </div>
          </div>
          <div className="cfg-grid2">
            <div className="form-grp">
              <label className="form-lbl">Titre principal</label>
              <input className="form-ctrl" value={cfg.heroTitle} onChange={e=>upd("heroTitle",e.target.value)}/>
            </div>
            <div className="form-grp">
              <label className="form-lbl">Titre en italique doré</label>
              <input className="form-ctrl" value={cfg.heroTitleEm} onChange={e=>upd("heroTitleEm",e.target.value)}/>
            </div>
          </div>
          <div className="form-grp" style={{marginBottom:16}}>
            <label className="form-lbl">Sous-titre</label>
            <textarea className="form-ctrl" rows={3} value={cfg.heroSub} onChange={e=>upd("heroSub",e.target.value)}/>
          </div>
          <div className="live-preview">
            <div style={{fontSize:".72rem",color:"var(--muted)",marginBottom:10,textTransform:"uppercase",letterSpacing:".1em"}}>Aperçu</div>
            <div className="preview-hero" style={{background:`linear-gradient(135deg,${cfg.colorDark||"#2a2318"} 0%,#3d3020 50%,${cfg.colorCanal||"#3d6b6b"} 100%)`}}>
              <div style={{fontSize:".65rem",letterSpacing:".15em",textTransform:"uppercase",color:cfg.colorGold||"#c8a050",marginBottom:8}}>{cfg.heroTag}</div>
              <div className="preview-title">{cfg.heroTitle}<br/><em style={{color:cfg.colorGold||"#c8a050"}}>{cfg.heroTitleEm}</em></div>
              <div style={{fontSize:".78rem",opacity:.7,marginTop:8,maxWidth:340,margin:"8px auto 0"}}>{cfg.heroSub}</div>
            </div>
          </div>
          <button className="cfg-save-btn" onClick={()=>save(cfg)}>💾 Sauvegarder</button>
        </div>
      )}

      {/* ── CONTACT & TARIFS ── */}
      {tab==="contact" && (
        <div className="cfg-section">
          <div className="cfg-title">Contact & tarifs</div>
          <div className="cfg-sub">Numéro WhatsApp, email et montant minimum</div>
          <div className="cfg-grid2">
            <div className="form-grp">
              <label className="form-lbl">WhatsApp (sans +, sans espaces)</label>
              <input className="form-ctrl" placeholder="33767891074" value={cfg.whatsapp} onChange={e=>upd("whatsapp",e.target.value)}/>
              <div style={{fontSize:".72rem",color:"var(--muted)",marginTop:4}}>Ex : 33767891074 pour le +33 7 67 89 10 74</div>
            </div>
            <div className="form-grp">
              <label className="form-lbl">Email de contact</label>
              <input className="form-ctrl" type="email" placeholder="contact@lock-dock-delivery.fr" value={cfg.email} onChange={e=>upd("email",e.target.value)}/>
              <div style={{fontSize:".72rem",color:"var(--muted)",marginTop:4}}>Affiché aux clients sur la page catalogue</div>
            </div>
          </div>
          <div className="form-grp" style={{maxWidth:200}}>
            <label className="form-lbl">Commande minimum (€)</label>
            <input className="form-ctrl" type="number" min="0" value={cfg.minCommande} onChange={e=>upd("minCommande",Number(e.target.value))}/>
          </div>
          <button className="cfg-save-btn" onClick={()=>save(cfg)}>💾 Sauvegarder</button>
        </div>
      )}

      {/* ── VISUELS ── */}
      {tab==="visuels" && (
        <div className="cfg-section">
          <div className="cfg-title">Couleurs du site</div>
          <div className="cfg-sub">Changez l&apos;ambiance visuelle en un clic — la prévisualisation est en direct</div>
          {[
            ["colorDark",  "Couleur principale (fond nav, boutons)"],
            ["colorGold",  "Couleur dorée (accents, prix)"],
            ["colorCanal", "Couleur canal (liens, sélections)"],
            ["colorOlive", "Couleur olive (hover, secondaire)"],
          ].map(([key,lbl])=>(
            <div className="cfg-color-row" key={key}>
              <div className="cfg-color-lbl">{lbl}</div>
              <input type="color" value={cfg[key]||"#000000"} onChange={e=>{upd(key,e.target.value); document.documentElement.style.setProperty(key==="colorDark"?"--dark":key==="colorGold"?"--gold":key==="colorCanal"?"--canal":"--olive",e.target.value);}}/>
              <input className="cfg-color-hex form-ctrl" value={cfg[key]||""} onChange={e=>{upd(key,e.target.value); document.documentElement.style.setProperty(key==="colorDark"?"--dark":key==="colorGold"?"--gold":key==="colorCanal"?"--canal":"--olive",e.target.value);}} placeholder="#000000" style={{maxWidth:120}}/>
            </div>
          ))}
          <div className="live-preview">
            <div style={{fontSize:".72rem",color:"var(--muted)",marginBottom:10,textTransform:"uppercase",letterSpacing:".1em"}}>Aperçu en direct</div>
            <div className="preview-hero" style={{background:`linear-gradient(135deg,${cfg.colorDark} 0%,#3d3020 50%,${cfg.colorCanal} 100%)`}}>
              <div style={{fontSize:".65rem",letterSpacing:".12em",textTransform:"uppercase",color:cfg.colorGold,marginBottom:6}}>{cfg.heroTag}</div>
              <div className="preview-title">{cfg.heroTitle} <em style={{color:cfg.colorGold}}>{cfg.heroTitleEm}</em></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
              <span style={{background:cfg.colorDark,color:"white",padding:"6px 14px",borderRadius:7,fontSize:".8rem"}}>Bouton principal</span>
              <span style={{background:cfg.colorOlive,color:"white",padding:"6px 14px",borderRadius:7,fontSize:".8rem"}}>Hover</span>
              <span style={{background:cfg.colorCanal,color:"white",padding:"6px 14px",borderRadius:7,fontSize:".8rem"}}>Sélectionné</span>
              <span style={{color:cfg.colorGold,fontFamily:"var(--fd)",fontSize:"1.4rem",fontWeight:600}}>52 €</span>
            </div>
          </div>
          <button className="cfg-save-btn" onClick={()=>save(cfg)}>💾 Sauvegarder les couleurs</button>
        </div>
      )}

      {/* ── PRIX PACKS ── */}
      {tab==="packs" && (
        <div className="cfg-section">
          <div className="cfg-title">Prix des packs</div>
          <div className="cfg-sub">Modifiez les tarifs — les changements s&apos;appliquent immédiatement sur le catalogue</div>
          {Object.entries(cfg.packPrices).map(([id, price])=>(
            <div className="cfg-pack-row" key={id}>
              <div className="cfg-pack-ico">{PACK_ICOS[id]}</div>
              <div style={{flex:1}}>
                <div className="cfg-pack-name">{PACK_LABELS[id]}</div>
                <div className="cfg-pack-cat">{id.includes("apero")?"Apéro":id.includes("ptitdej")?"Petit-déjeuner":"Essentiel"}</div>
              </div>
              <input
                type="number" min="0" step="1"
                value={price}
                onChange={e=>updPrice(id, e.target.value)}
                style={{width:90,padding:"8px 10px",border:"1.5px solid var(--sand)",borderRadius:8,fontFamily:"var(--fd)",fontSize:"1.2rem",fontWeight:600,color:"var(--canal)",textAlign:"center",background:"var(--cream)",outline:"none"}}
              />
              <span style={{fontSize:".82rem",color:"var(--muted)"}}>€</span>
            </div>
          ))}
          <button className="cfg-save-btn" onClick={()=>save(cfg)}>💾 Sauvegarder les prix</button>
        </div>
      )}

      {/* ── HALTES & CRÉNEAUX ── */}
      {tab==="haltes" && (<>
        <div className="cfg-section">
          <div className="cfg-title">Haltes couvertes</div>
          <div className="cfg-sub">Ports et haltes nautiques où vous livrez</div>
          {cfg.haltes.map((h,i)=>(
            <div className="cfg-list-item" key={i}>
              <span style={{fontSize:"1rem"}}>📍</span>
              <input value={h} onChange={e=>editHalte(i,e.target.value)} onBlur={()=>save(cfg)}/>
              <button className="cfg-del-btn" onClick={()=>delHalte(i)}>✕</button>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input className="form-ctrl" placeholder="Nouvelle halte…" value={newHalte} onChange={e=>setNewHalte(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHalte()} style={{flex:1}}/>
            <button className="cfg-save-btn" style={{marginTop:0}} onClick={addHalte}>+ Ajouter</button>
          </div>
        </div>
        <div className="cfg-section">
          <div className="cfg-title">Créneaux de livraison</div>
          <div className="cfg-sub">Plages horaires proposées aux clients</div>
          {cfg.creneaux.map((c,i)=>(
            <div className="cfg-list-item" key={i}>
              <span style={{fontSize:"1rem"}}>⏰</span>
              <input value={c} onChange={e=>editCreneau(i,e.target.value)} onBlur={()=>save(cfg)}/>
              <button className="cfg-del-btn" onClick={()=>delCreneau(i)}>✕</button>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <input className="form-ctrl" placeholder="Ex: 12h–13h" value={newCreneau} onChange={e=>setNewCreneau(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCreneau()} style={{flex:1}}/>
            <button className="cfg-save-btn" style={{marginTop:0}} onClick={addCreneau}>+ Ajouter</button>
          </div>
        </div>
      </>)}
    </div>
  );
}

// Fonction pour récupérer la config active (utilisée par Catalogue)
const getConfig = () => {
  try { const d=localStorage.getItem(SK_CONFIG); return d?JSON.parse(d):DEFAULT_CONFIG; } catch(e){return DEFAULT_CONFIG;}
};

// ═══════════════════════════════════════════════════════
//  MOT DE PASSE ADMIN
// ═══════════════════════════════════════════════════════
const ADMIN_PASSWORD = "canal2025"; // ← changez ce mot de passe

function LoginModal({onSuccess, onCancel}) {
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState(false);

  const tryLogin = () => {
    if (pwd === ADMIN_PASSWORD) { onSuccess(); setErr(false); }
    else { setErr(true); setPwd(""); }
  };

  return (
    <div className="overlay show" onClick={e=>{ if(e.target.classList.contains("overlay")) onCancel(); }}>
      <div className="modal">
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:"2rem",marginBottom:8}}>🔐</div>
          <div className="modal-title" style={{textAlign:"center"}}>Accès réservé</div>
          <div style={{fontSize:".82rem",color:"var(--muted)"}}>Back-office & Stock — usage interne uniquement</div>
        </div>
        <div className="form-grp" style={{marginBottom:14}}>
          <label className="form-lbl">Mot de passe</label>
          <input
            className="form-ctrl"
            type="password"
            placeholder="••••••••"
            value={pwd}
            onChange={e=>{ setPwd(e.target.value); setErr(false); }}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}
            autoFocus
            style={err?{borderColor:"var(--red)"}:{}}
          />
          {err && <div style={{fontSize:".75rem",color:"var(--red)",marginTop:4}}>Mot de passe incorrect</div>}
        </div>
        <div className="modal-btns">
          <button className="btn-cancel" onClick={onCancel}>Annuler</button>
          <button className="btn-save"   onClick={tryLogin}>Entrer</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════
function App() {
  const [view,     setView]      = useState("catalogue");
  const [isAdmin,  setIsAdmin]   = useState(()=>sessionStorage.getItem("canal-admin")==="1");
  const [showLogin,setShowLogin] = useState(false);
  const [pendingView,setPending] = useState(null);
  const [stockState,setStockState]=useState(()=>lsGet(SK_STOCK,{produits:DEFAULT_STOCK_PRODUITS,mouvements:[],nextId:18}));
  const alerts=stockState.produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length;

  const goAdmin = (target) => {
    if (isAdmin) { setView(target); }
    else { setPending(target); setShowLogin(true); }
  };

  const onLoginSuccess = () => {
    sessionStorage.setItem("canal-admin","1");
    setIsAdmin(true);
    setShowLogin(false);
    if (pendingView) { setView(pendingView); setPending(null); }
  };

  const logout = () => {
    sessionStorage.removeItem("canal-admin");
    setIsAdmin(false);
    setView("catalogue");
    showToast("Déconnecté","");
  };

  return (<>
    <nav className="nav">
      <div className="nav-logo">
        <img src={LOGO_SM} alt="Lock & Dock Delivery"/>
        <span className="nav-logo-text">Lock <span>&</span> Dock</span>
      </div>
      <div className="nav-tabs">
        <button className={`nav-tab${view==="catalogue"?" active":""}`} onClick={()=>setView("catalogue")}>
          🛒 Catalogue
        </button>
        <button className={`nav-tab${view==="backoffice"?" active":""}`} onClick={()=>goAdmin("backoffice")}>
          {isAdmin?"⚙️":"🔒"} Back-office
        </button>
        <button className={`nav-tab${view==="stock"?" active":""}`} onClick={()=>goAdmin("stock")}>
          {isAdmin?"📦":"🔒"} Stock{isAdmin&&alerts>0&&<span className="dot"/>}
        </button>
        {isAdmin&&(
          <button className="nav-tab" onClick={logout} style={{color:"var(--terra)",fontSize:".72rem"}}>
            Quitter ↩
          </button>
        )}
      </div>
    </nav>

    {view==="catalogue"  && <Catalogue/>}
    {view==="backoffice" && isAdmin && <Backoffice stockState={stockState} setStockState={setStockState}/>}
    {view==="stock"      && isAdmin && <Stock      stockState={stockState} setStockState={setStockState}/>}

    {showLogin && (
      <LoginModal
        onSuccess={onLoginSuccess}
        onCancel={()=>{ setShowLogin(false); setPending(null); }}
      />
    )}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
