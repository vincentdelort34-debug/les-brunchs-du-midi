<html lang="fr">
<head>
  <meta charset="UTF-8"/>

  <meta name="description" content="Faites livrer vos provisions directement sur votre bateau. Produits locaux, livraison sur le Canal du Midi entre Le Somail et Béziers."/>
  <meta name="keywords" content="livraison bateau Canal du Midi, provisions bord, épicerie bateau, Le Somail, Béziers, Capestang, Occitanie"/>
  <meta property="og:title" content="Lock and Dock Delivery — Livraison à bord"/>
  <meta property="og:description" content="Provisions livrées sur votre bateau en moins d'une heure. Canal du Midi, Le Somail → Béziers."/>
  <meta property="og:type" content="website"/>

  <meta name="twitter:card" content="summary"/>

  <meta name="theme-color" content="#6B4226"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Lock and Dock Delivery"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:  #f5f0e6;
      --linen:  #ede8dc;
      --sand:   #d9d0be;
      --dark:   #1c1a17;
      --dark2:  #2a2620;
      --moka:   #6B4226;
      --moka2:  #7B5035;
      --moka3:  #8B5E3C;
      --gold:   #b8965a;
      --gold2:  #d4aa6e;
      --muted:  #7a7060;
      --white:  #ffffff;
      --green:  #27ae60;
      --red:    #c0392b;
      --orange: #e67e22;
      --canal:  #3d6b6b;
      --sh:  0 1px 12px rgba(28,26,23,.08);
      --sh2: 0 4px 32px rgba(28,26,23,.30);
      --r: 6px;
      --fd: 'Cormorant Garamond', serif;
      --fs: 'DM Sans', sans-serif;
    }
    html, body, #root { min-height: 100vh; }
    body {
      font-family: var(--fs);
      background: var(--dark);
      color: var(--cream);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
    }
    img { max-width:100%; display:block; }
    button { font-family: inherit; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 0 24px; height: 68px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; flex-shrink: 0; user-select: none; }
    .nav-logo-mark {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--moka2), var(--moka));
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-family: var(--fd); font-weight: 600; font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .nav-logo-text { display: flex; flex-direction: column; }
    .nav-logo-name {
      font-family: var(--fd); font-size: 1.05rem; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase; color: var(--cream); line-height: 1;
    }
    .nav-logo-sub {
      font-size: .58rem; letter-spacing: .25em;
      text-transform: uppercase; color: var(--gold); margin-top: 3px;
    }
    .nav-right { display: flex; align-items: center; gap: 6px; }
    .nav-tab {
      padding: 8px 14px; border-radius: 6px; border: none;
      font-family: var(--fs); font-size: .78rem; font-weight: 500;
      cursor: pointer; transition: all .2s;
      background: transparent; color: rgba(255,255,255,.55); white-space: nowrap;
    }
    .nav-tab.active { background: rgba(184,150,90,.15); color: var(--gold); }
    .nav-tab:hover:not(.active) { background: rgba(255,255,255,.07); color: var(--white); }
    .nav-menu-btn {
      display: none; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      color: var(--cream); width: 40px; height: 40px; border-radius: 8px;
      cursor: pointer; font-size: 1.1rem; align-items: center; justify-content: center;
    }
    .nav-drawer {
      display: none;
      position: fixed; top: 68px; right: 16px; z-index: 99;
      background: var(--dark2); border: 1px solid rgba(255,255,255,.12);
      padding: 10px; border-radius: 12px; box-shadow: var(--sh2);
      flex-direction: column; gap: 4px; min-width: 180px;
    }
    .nav-drawer.open { display: flex; }
    .nav-drawer .nav-tab { text-align: left; padding: 12px 14px; }

    /* ── HERO MOKA ── */
    .hero {
      position: relative;
      background:
        radial-gradient(ellipse at top, rgba(184,150,90,.12) 0%, transparent 50%),
        linear-gradient(180deg, var(--moka) 0%, var(--moka2) 35%, #4a2f1c 75%, var(--dark) 100%);
      color: var(--white);
      padding: 64px 24px 80px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b8965a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .hero-tag {
      font-size: .65rem; letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 22px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      position: relative;
    }
    .hero-tag::before, .hero-tag::after {
      content: ''; flex: 1; max-width: 50px; height: 1px;
      background: var(--gold); opacity: .5;
    }
    .hero h1 {
      font-family: var(--fd); font-size: clamp(2.6rem, 6vw, 4.8rem);
      font-weight: 400; line-height: 1.05; letter-spacing: -.01em;
      margin-bottom: 18px; position: relative;
    }
    .hero h1 em { font-style: italic; color: var(--gold2); font-weight: 300; }
    .hero p {
      font-size: .95rem; color: rgba(255,255,255,.78);
      max-width: 540px; margin: 0 auto 36px; line-height: 1.65;
      position: relative;
    }
    .hero-btns {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
      position: relative;
    }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--gold); color: var(--dark);
      padding: 14px 30px; border: none; border-radius: 6px;
      font-weight: 600; font-size: .9rem; cursor: pointer;
      transition: all .25s; box-shadow: 0 6px 24px rgba(184,150,90,.35);
      letter-spacing: .03em;
    }
    .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(184,150,90,.5); background: var(--gold2); }
    .hero-cta-ghost {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.08); color: var(--white);
      padding: 14px 26px; border: 1px solid rgba(255,255,255,.22);
      border-radius: 6px; font-weight: 500; font-size: .88rem; cursor: pointer;
      transition: all .2s;
    }
    .hero-cta-ghost:hover { background: rgba(255,255,255,.15); }

    /* ── COMMENT ÇA MARCHE ── */
    .how-section { background: var(--dark2); padding: 64px 24px; border-top: 1px solid rgba(255,255,255,.06); }
    .how-title-wrap { text-align: center; margin-bottom: 48px; }
    .how-eyebrow { font-size: .7rem; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .how-title { font-family: var(--fd); font-size: clamp(2rem,4vw,2.8rem); font-weight: 400; color: var(--cream); }
    .how-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 20px; max-width: 1080px; margin: 0 auto;
    }
    .how-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 36px 22px 24px;
      text-align: center; position: relative;
    }
    .how-card-num {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--moka); color: var(--gold);
      font-family: var(--fd); font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--dark2);
    }
    .how-card-ico { font-size: 2.4rem; margin-bottom: 14px; display: block; }
    .how-card-title { font-family: var(--fd); font-size: 1.25rem; font-weight: 500; color: var(--cream); margin-bottom: 8px; }
    .how-card-desc { font-size: .82rem; color: rgba(255,255,255,.55); line-height: 1.6; }

    /* ── CATALOGUE TABS ── */
    .cat-nav {
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,.08);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky; top: 68px; z-index: 90;
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-nav-inner { display: flex; padding: 0 24px; min-width: max-content; }
    .cat-tab {
      padding: 18px 22px; font-size: .78rem; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.4); cursor: pointer;
      border: none; background: none; border-bottom: 2px solid transparent;
      transition: all .2s; white-space: nowrap; font-family: var(--fs);
    }
    .cat-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .cat-tab:hover:not(.active) { color: rgba(255,255,255,.85); }

    .cat-section-title { padding: 40px 24px 8px; max-width: 1100px; margin: 0 auto; }
    .cat-section-title h2 { font-family: var(--fd); font-size: clamp(1.9rem,3.5vw,2.6rem); font-weight: 400; color: var(--cream); }
    .cat-count { font-size: .7rem; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-top: 4px; }

    /* ── PRODUCT LIST ── */
    .products-list { padding: 8px 24px 60px; max-width: 1100px; margin: 0 auto; }
    .product-item {
      display: flex; align-items: flex-start; gap: 18px;
      padding: 22px 0; border-bottom: 1px solid rgba(255,255,255,.07);
      cursor: pointer; transition: background .15s;
    }
    .product-item:last-child { border-bottom: none; }
    .product-item:hover { background: rgba(255,255,255,.025); margin: 0 -16px; padding: 22px 16px; border-radius: 8px; }
    .product-img {
      width: 96px; height: 96px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(184,150,90,.15), rgba(107,66,38,.25));
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-family: var(--fd); font-size: 1.3rem; font-weight: 500; line-height: 1.2; margin-bottom: 4px; color: var(--cream); }
    .product-desc { font-size: .82rem; color: rgba(255,255,255,.5); line-height: 1.55; margin-bottom: 12px; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .product-price { font-family: var(--fd); font-size: 1.5rem; font-weight: 600; color: var(--gold); letter-spacing: -.01em; }
    .product-price span { font-size: .72rem; font-weight: 400; color: rgba(255,255,255,.4); margin-left: 4px; font-family: var(--fs); }
    .product-unav { font-size: .72rem; color: var(--red); letter-spacing: .12em; text-transform: uppercase; font-weight: 600; }
    .btn-add {
      background: var(--moka); color: var(--cream); border: none;
      padding: 10px 22px; border-radius: 6px;
      font-size: .76rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-add:hover { background: var(--moka2); transform: translateY(-1px); }
    .btn-add.in { background: var(--canal); }
    .qty-pill {
      display: flex; align-items: center; gap: 0;
      background: var(--moka); border-radius: 6px; overflow: hidden;
    }
    .qty-pill button {
      width: 36px; height: 38px; background: none; border: none;
      color: white; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-pill button:hover { background: rgba(255,255,255,.12); }
    .qty-pill span { color: white; font-weight: 600; font-size: .92rem; min-width: 26px; text-align: center; font-family: var(--fd); }

    /* ── PRODUCT MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(15,12,9,.75);
      backdrop-filter: blur(6px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow-y: auto;
    }
    .pmodal {
      background: var(--dark2); border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; width: 100%; max-width: 540px;
      box-shadow: var(--sh2); color: var(--cream);
      overflow: hidden;
      max-height: 90vh; overflow-y: auto;
    }
    .pmodal-img {
      width: 100%; aspect-ratio: 4/3;
      background: linear-gradient(135deg, var(--moka2), var(--moka));
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; color: rgba(255,255,255,.4);
    }
    .pmodal-img img { width: 100%; height: 100%; object-fit: cover; }
    .pmodal-body { padding: 26px 28px 28px; }
    .pmodal-name { font-family: var(--fd); font-size: 2rem; font-weight: 500; line-height: 1.1; margin-bottom: 10px; }
    .pmodal-desc { font-size: .92rem; color: rgba(255,255,255,.65); line-height: 1.6; margin-bottom: 24px; }
    .pmodal-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .pmodal-price { font-family: var(--fd); font-size: 2.2rem; font-weight: 600; color: var(--gold); }
    .pmodal-actions { display: flex; align-items: center; gap: 10px; }
    .pmodal-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0,0,0,.5); border: none;
      width: 36px; height: 36px; border-radius: 50%;
      color: white; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .pmodal-wrap { position: relative; }

    /* ── ORDER FORM ── */
    .order-section {
      padding: 48px 24px; background: var(--dark2);
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .order-inner { max-width: 720px; margin: 0 auto; }
    .order-section h2 { font-family: var(--fd); font-size: 2rem; font-weight: 400; margin-bottom: 6px; color: var(--cream); }
    .order-sub { font-size: .85rem; color: rgba(255,255,255,.45); margin-bottom: 28px; }
    .order-lines {
      margin-bottom: 22px; border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; overflow: hidden;
    }
    .order-line {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 18px; border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: .9rem; color: var(--cream);
    }
    .order-line:last-child { border-bottom: none; }
    .order-line-label { display: flex; align-items: center; gap: 10px; }
    .order-line-rm {
      background: none; border: none; color: rgba(255,255,255,.35);
      cursor: pointer; font-size: .9rem; padding: 4px 6px; border-radius: 4px;
    }
    .order-line-rm:hover { color: var(--red); background: rgba(255,255,255,.05); }
    .order-total {
      display: flex; justify-content: space-between;
      padding: 16px 18px; background: var(--dark); color: white;
      font-weight: 600; font-family: var(--fd); font-size: 1.25rem;
    }
    .empty-cart {
      padding: 36px; text-align: center; color: rgba(255,255,255,.4);
      font-size: .9rem; border: 1px dashed rgba(255,255,255,.12);
      border-radius: 8px; margin-bottom: 22px;
    }
    .notice {
      padding: 12px 16px; border-radius: 6px;
      font-size: .82rem; margin-bottom: 14px;
    }
    .notice.warn { background: rgba(230,126,34,.15); color: var(--gold2); border: 1px solid rgba(230,126,34,.3); }
    .notice.info { background: rgba(255,255,255,.05); color: rgba(255,255,255,.65); border: 1px solid rgba(255,255,255,.1); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-grp { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .form-lbl { font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.5); }
    .form-ctrl {
      padding: 12px 14px; border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 6px; font-family: var(--fs); font-size: .9rem;
      background: rgba(255,255,255,.05); color: var(--cream); outline: none;
      transition: border-color .2s;
    }
    .form-ctrl:focus { border-color: var(--gold); }
    .form-ctrl option { background: var(--dark2); color: var(--cream); }

    .order-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
    .btn-pay {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--gold); color: var(--dark);
      padding: 16px 24px; border-radius: 8px;
      font-weight: 700; font-size: .95rem; border: none; cursor: pointer;
      width: 100%; transition: all .2s; letter-spacing: .03em;
    }
    .btn-pay:hover:not(:disabled) { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(184,150,90,.35); }
    .btn-pay:disabled { opacity: .5; cursor: not-allowed; }
    .btn-wa, .btn-sms {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 14px 24px; border-radius: 8px;
      font-weight: 600; font-size: .92rem; border: none; cursor: pointer;
      width: 100%; transition: all .2s; text-decoration: none;
    }
    .btn-wa { background: #25d366; color: white; }
    .btn-wa:hover:not(.disabled) { background: #1ea952; }
    .btn-sms { background: rgba(255,255,255,.1); color: var(--cream); border: 1px solid rgba(255,255,255,.2); }
    .btn-sms:hover:not(.disabled) { background: rgba(255,255,255,.18); }
    .btn-wa.disabled, .btn-sms.disabled { opacity: .45; cursor: not-allowed; }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--dark); padding: 56px 24px 36px;
      text-align: center; border-top: 1px solid rgba(255,255,255,.06);
    }
    .footer-brand {
      font-family: var(--fd); font-size: 1.7rem; font-weight: 400;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--white); margin-bottom: 8px;
    }
    .footer-sub {
      font-size: .65rem; letter-spacing: .25em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 6px;
    }
    .footer-info { font-size: .76rem; color: rgba(255,255,255,.45); margin-top: 14px; line-height: 1.7; }
    .footer-divider { width: 60px; height: 1px; background: var(--gold); margin: 18px auto; opacity: .4; }
    .footer-link {
      font-size: .74rem; color: rgba(255,255,255,.4);
      text-decoration: none; cursor: pointer; background: none; border: none;
      font-family: var(--fs); transition: color .2s;
      margin: 12px 8px 0; display: inline-block;
    }
    .footer-link:hover { color: var(--gold); }

    /* ── ADMIN ── */
    .page { padding: 32px 24px; max-width: 1200px; margin: 0 auto; color: var(--cream); }
    .sec-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
    .sec-title { font-family: var(--fd); font-size: 2rem; font-weight: 500; line-height: 1.2; }
    .sec-sub { font-size: .85rem; color: rgba(255,255,255,.5); margin-top: 4px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 18px; }
    .stat-lbl { font-size: .68rem; text-transform: uppercase; letter-spacing: .12em; color: rgba(255,255,255,.45); margin-bottom: 8px; }

  try {

let toastTimer = null;
function Toast({ msg, kind, onDone }) {
  useEffect(() => {
    if (!msg) return;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(onDone, 2400);
    return () => { if (toastTimer) clearTimeout(toastTimer); };
  }, [msg]);
  if (!msg) return null;
  return <div className={"toast show " + (kind || "default")}>{msg}</div>;
}

        const p = catalogue.products.find(x => x.id === pid);
        if (!p) return null;
        return { id: pid, name: p.name, price: p.price, qty };
      })
      .filter(Boolean);
  }, [cart, catalogue]);

  const total = cartItems.reduce((s, it) => s + it.price * it.qty, 0);
  const minCmd = siteCfg.minCmd || 25;

  const addToCart = (p, e) => {
    if (e) e.stopPropagation();
    if (!p.available) { showToast("Produit indisponible", "red"); return; }
    setCart(c => ({ ...c, [p.id]: (c[p.id] || 0) + 1 }));
  };
  const minusFromCart = (p, e) => {
    if (e) e.stopPropagation();
    setCart(c => {
      const n = (c[p.id] || 0) - 1;
      const next = { ...c };
      if (n <= 0) delete next[p.id]; else next[p.id] = n;
      return next;
    });
  };
  const removeLine = (id) => {
    setCart(c => { const n = { ...c }; delete n[id]; return n; });
  };

  const canSubmit = () => cartItems.length > 0 && total >= minCmd && form.name && form.halte && form.creneau;

  const sendWA = () => {
    if (!canSubmit()) return;
    const msg = buildOrderMsg(cartItems, form, total);
    const num = (siteCfg.contact.whatsapp || "").replace(/[^0-9]/g, "");
    const url = "https://wa.me/" + num + "?text=" + encodeURIComponent(msg);
    onCmdSubmit({ items: cartItems, form, total, channel: "whatsapp" });
    setCart({}); setForm({ name:"", phone:"", boat:"", halte:"", creneau:"", date: todayISO(), notes:"" });
    window.open(url, "_blank");
    showToast("Commande envoyée ✓", "green");
  };

  const sendSMS = () => {
    if (!canSubmit()) return;
    const msg = buildOrderMsg(cartItems, form, total);
    const num = (siteCfg.contact.sms || siteCfg.contact.whatsapp || "").replace(/\s/g, "");
    const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const sep = isIos ? "&" : "?";
    const url = "sms:" + num + sep + "body=" + encodeURIComponent(msg);
    onCmdSubmit({ items: cartItems, form, total, channel: "sms" });
    setCart({}); setForm({ name:"", phone:"", boat:"", halte:"", creneau:"", date: todayISO(), notes:"" });
    window.location.href = url;
    showToast("Commande envoyée par SMS ✓", "green");
  };

  const payOnline = () => {
    if (!canSubmit()) return;
    showToast("💳 Paiement en ligne bientôt disponible", "default");
  };

  const zoomQty = zoomProd ? (cart[zoomProd.id] || 0) : 0;

  const scrollToOrder = () => {
    const el = document.getElementById("commande");
    if (el) el.scrollIntoView({ behavior: "smooth" });
  };
  const scrollToCatalogue = () => {
    const el = document.getElementById("catalogue");
    if (el) el.scrollIntoView({ behavior: "smooth" });
  };

  return (
    <div>
      {/* HERO */}
      <section className="hero">
        <div className="hero-tag">{siteCfg.texts.heroTag}</div>
        <h1>{siteCfg.texts.heroTitle} <em>{siteCfg.texts.heroTitleEm}</em></h1>
        <p>{siteCfg.texts.heroSub}</p>
        <div className="hero-btns">
          <button className="hero-cta" onClick={scrollToCatalogue}>🛒 Voir le catalogue</button>
          <button className="hero-cta-ghost" onClick={scrollToOrder}>Passer commande</button>
        </div>
      </section>

      {/* COMMENT ÇA MARCHE */}
      <section className="how-section">
        <div className="how-title-wrap">
          <div className="how-eyebrow">Simple comme bonjour</div>
          <h2 className="how-title">Comment ça marche</h2>
        </div>
        <div className="how-grid">
          <div className="how-card">
            <div className="how-card-num">1</div>
            <span className="how-card-ico">🛒</span>
            <div className="how-card-title">Choisissez vos produits</div>
            <div className="how-card-desc">Parcourez les onglets et ajoutez ce qu'il vous faut à votre panier.</div>
          </div>
          <div className="how-card">
            <div className="how-card-num">2</div>
            <span className="how-card-ico">📍</span>
            <div className="how-card-title">Indiquez votre halte</div>
            <div className="how-card-desc">Sélectionnez le port ou l'écluse le plus proche, et un créneau horaire.</div>
          </div>
          <div className="how-card">
            <div className="how-card-num">3</div>
            <span className="how-card-ico">💬</span>
            <div className="how-card-title">Validez la commande</div>
            <div className="how-card-desc">Envoi instantané par WhatsApp ou SMS. Confirmation rapide par retour.</div>
          </div>
          <div className="how-card">
            <div className="how-card-num">4</div>
            <span className="how-card-ico">🚢</span>
            <div className="how-card-title">Livraison à bord</div>
            <div className="how-card-desc">Vos provisions vous attendent à la halte, à l'heure prévue.</div>
          </div>
        </div>
      </section>

      {/* CATALOGUE */}
      <section id="catalogue">
        <div className="cat-nav">
          <div className="cat-nav-inner">
            {catalogue.tabs.map(t => (
              <button
                key={t.id}
                className={"cat-tab " + (t.id === tabId ? "active" : "")}
                onClick={() => setTabId(t.id)}
              >{t.name}</button>
            ))}
          </div>
        </div>

        {catalogue.tabs.length === 0 && (
          <div className="empty-st">
            <div className="ico">📦</div>
            <div>Aucun onglet n'a encore été créé. Rendez-vous dans Config → Catalogue.</div>
          </div>
        )}

        {tabId && (
          <div className="cat-section-title">
            <h2>{(catalogue.tabs.find(x => x.id === tabId) || {}).name}</h2>
            <div className="cat-count">{productsForTab.length} produit{productsForTab.length > 1 ? "s" : ""}</div>
          </div>
        )}

        <div className="products-list">
          {productsForTab.length === 0 && tabId && (
            <div className="empty-st">
              <div className="ico">🍽️</div>
              <div>Aucun produit dans cet onglet pour le moment.</div>
            </div>
          )}
          {productsForTab.map(p => {
            const qty = cart[p.id] || 0;
            return (
              <div key={p.id} className="product-item" onClick={() => setZoomProd(p)}>
                <div className="product-img">
                  {p.photo ? <img src={p.photo} alt={p.name}/> : <span>🍽️</span>}
                </div>
                <div className="product-info">
                  <div className="product-name">{p.name}</div>
                  {p.desc && <div className="product-desc">{p.desc}</div>}
                  <div className="product-footer">
                    <div className="product-price">{fmtEUR(p.price)}</div>
                    {!p.available
                      ? <span className="product-unav">Indisponible</span>
                      : qty > 0
                        ? <div className="qty-pill" onClick={e => e.stopPropagation()}>
                            <button onClick={e => minusFromCart(p, e)}>−</button>
                            <span>{qty}</span>
                            <button onClick={e => addToCart(p, e)}>+</button>
                          </div>
                        : <button className="btn-add" onClick={e => addToCart(p, e)}>+ Ajouter</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </section>

      {/* COMMANDE */}
      <section id="commande" className="order-section">
        <div className="order-inner">
          <h2>Votre commande</h2>
          <div className="order-sub">Vérifiez les produits, complétez vos infos, puis envoyez.</div>

          {cartItems.length === 0
            ? <div className="empty-cart">🛒 Votre panier est vide. Ajoutez des produits depuis le catalogue.</div>
            : (
              <div className="order-lines">
                {cartItems.map(it => (
                  <div key={it.id} className="order-line">
                    <div className="order-line-label">
                      <span>{it.qty}× {it.name}</span>
                      <button className="order-line-rm" onClick={() => removeLine(it.id)} title="Retirer">✕</button>
                    </div>
                    <div>{fmtEUR(it.price * it.qty)}</div>
                  </div>
                ))}
                <div className="order-total">
                  <div>Total</div>
                  <div>{fmtEUR(total)}</div>
                </div>
              </div>
            )}

          {cartItems.length > 0 && total < minCmd && (
            <div className="notice warn">⚠️ Commande minimum : {fmtEUR(minCmd)}. Ajoutez {fmtEUR(minCmd - total)} pour valider.</div>
          )}

          <div className="form-row">
            <div className="form-grp">
              <label className="form-lbl">Nom *</label>
              <input className="form-ctrl" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Votre nom" />
            </div>
            <div className="form-grp">
              <label className="form-lbl">Téléphone</label>
              <input className="form-ctrl" type="tel" value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} placeholder="06 12 34 56 78" />
            </div>
          </div>
          <div className="form-row">
            <div className="form-grp">
              <label className="form-lbl">Halte *</label>
              <select className="form-ctrl" value={form.halte} onChange={e => setForm({...form, halte: e.target.value})}>
                <option value="">— Choisir une halte —</option>
                {(siteCfg.haltes || DEFAULT_HALTES).map(h => <option key={h} value={h}>{h}</option>)}
              </select>
            </div>
            <div className="form-grp">
              <label className="form-lbl">Créneau *</label>
              <select className="form-ctrl" value={form.creneau} onChange={e => setForm({...form, creneau: e.target.value})}>
                <option value="">— Choisir un créneau —</option>
                {(siteCfg.creneaux || DEFAULT_CRENEAUX).map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-grp">
              <label className="form-lbl">Date</label>
              <input className="form-ctrl" type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
            </div>

              <input className="form-ctrl" value={form.boat} onChange={e => setForm({...form, boat: e.target.value})} placeholder="Nom du bateau" />

          </div>

  );

function BackOffice({ orders, refreshOrders, showToast }) {
  const [filter, setFilter] = useState("all");

  const stats = useMemo(() => {
    const today = todayISO();
    return {
      total: orders.length,
      news: orders.filter(o => o.status === "new").length,
      today: orders.filter(o => (o.date || "").startsWith(today)).length,
      revenue: orders.filter(o => o.status !== "cancelled").reduce((s, o) => s + Number(o.total || 0), 0)
    };
  }, [orders]);

  const filtered = filter === "all" ? orders : orders.filter(o => o.status === filter);

  const setStatus = async (id, status) => {
    const ok = await sbOrderUpdate(id, { status });
    if (ok) { showToast("Statut mis à jour", "green"); refreshOrders(); }
    else showToast("Erreur de mise à jour", "red");
  };
  const removeOrder = async (id) => {
    if (!window.confirm("Supprimer cette commande ?")) return;
    const ok = await sbOrderDelete(id);
    if (ok) { showToast("Commande supprimée", "green"); refreshOrders(); }
    else showToast("Erreur de suppression", "red");
  };

  return (
    <div className="page">
      <div className="sec-head">
        <div>
          <div className="sec-title">📋 Back-office</div>
          <div className="sec-sub">Suivi des commandes en temps réel</div>
        </div>
        <button className="btn-dark" onClick={refreshOrders}>↻ Rafraîchir</button>
      </div>

      <div className="stats-grid">
        <div className="stat-card"><div className="stat-lbl">Total</div><div className="stat-val">{stats.total}</div></div>
        <div className="stat-card"><div className="stat-lbl">Nouvelles</div><div className="stat-val sv-orange">{stats.news}</div></div>
        <div className="stat-card"><div className="stat-lbl">Aujourd'hui</div><div className="stat-val sv-green">{stats.today}</div></div>
        <div className="stat-card"><div className="stat-lbl">Chiffre d'affaires</div><div className="stat-val sv-gold">{fmtEUR(stats.revenue)}</div></div>
      </div>

      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"18px"}}>
        {[["all","Toutes"],["new","Nouvelles"],["confirmed","Confirmées"],["delivered","Livrées"],["cancelled","Annulées"]].map(([k,l]) => (
          <button key={k} className={"cfg-tab " + (filter === k ? "active" : "")} onClick={() => setFilter(k)}>{l}</button>
        ))}
      </div>

      {filtered.length === 0
        ? <div className="empty-st"><div className="ico">📭</div><div>Aucune commande {filter !== "all" ? "dans cette catégorie" : "pour le moment"}.</div></div>
        : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th><th>Client</th><th>Articles</th>
                  <th>Halte</th><th>Créneau</th><th>Total</th>
                  <th>Statut</th><th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(o => {
                  const items = Array.isArray(o.items) ? o.items : [];
                  return (
                    <tr key={o.id}>
                      <td>{(o.date || "").slice(0,10)}<div style={{fontSize:".7rem",color:"var(--muted)"}}>{(o.created_at || "").slice(11,16)}</div></td>
                      <td><div style={{fontWeight:600}}>{o.client || "—"}</div><div style={{fontSize:".7rem",color:"var(--muted)"}}>{o.phone || ""}</div></td>
                      <td>
                        {items.length > 0
                          ? <div style={{fontSize:".82rem"}}>{items.map(it => it.qty + "× " + it.name).join(", ")}</div>
                          : <span style={{color:"var(--muted)"}}>—</span>}
                      </td>
                      <td>{o.halte || "—"}</td>
                      <td>{o.creneau || "—"}</td>
                      <td style={{fontWeight:600}}>{fmtEUR(o.total)}</td>
                      <td>
                        <select
                          value={o.status || "new"}
                          onChange={e => setStatus(o.id, e.target.value)}
                          className={"sbadge badge-" + (o.status || "new")}
                          style={{border:"none",cursor:"pointer",fontWeight:600}}
                        >
                          <option value="new">Nouvelle</option>
                          <option value="confirmed">Confirmée</option>
                          <option value="delivered">Livrée</option>
                          <option value="cancelled">Annulée</option>
                        </select>
                      </td>
                      <td><button className="btn-sm d" onClick={() => removeOrder(o.id)}>🗑</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
    </div>
  );
}

function ConfigList({ label, hint, values, onChange }) {
  const [draft, setDraft] = useState(values || []);
  const [newVal, setNewVal] = useState("");
  useEffect(() => { setDraft(values || []); }, [values]);

  const update = (i, v) => { const n=[...draft]; n[i]=v; setDraft(n); };
  const add = () => { if(!newVal.trim()) return; onChange([...(values||[]), newVal.trim()]); setNewVal(""); };
  const del = (i) => onChange((values||[]).filter((_,idx)=>idx!==i));
  const move = (i, dir) => {
    const j = i + dir; if (j < 0 || j >= (values||[]).length) return;
    const n = [...(values||[])]; [n[i], n[j]] = [n[j], n[i]]; onChange(n);
  };
  const commit = (i) => { if(draft[i] !== (values||[])[i]) onChange(draft); };

  return (
    <div className="cfg-section">
      <div className="cfg-title">{label}</div>
      <div className="cfg-sub">{hint}</div>
      {draft.map((v, i) => (
        <div key={i} className="cfg-list-item">
          <button className="icon-btn" onClick={() => move(i,-1)} disabled={i===0} title="Monter">▲</button>
          <button className="icon-btn" onClick={() => move(i,+1)} disabled={i===draft.length-1} title="Descendre">▼</button>
          <input value={v} onChange={e => update(i, e.target.value)} onBlur={() => commit(i)} />
          <button className="icon-btn d" onClick={() => del(i)} title="Supprimer">✕</button>
        </div>
      ))}
      <div className="cfg-add">
        <input value={newVal} onChange={e => setNewVal(e.target.value)} placeholder={"Nouveau…"} onKeyDown={e => e.key === "Enter" && add()}/>
        <button className="btn-dark" onClick={add}>+ Ajouter</button>
      </div>
    </div>
  );
}

      <div className="form-grp"><label className="form-lbl">Petit texte (au-dessus du titre)</label>
        <input className="form-ctrl" value={t.heroTag} onChange={e => setT({...t, heroTag: e.target.value})} onBlur={commit}/></div>
      <div className="form-grp"><label className="form-lbl">Titre principal</label>
        <input className="form-ctrl" value={t.heroTitle} onChange={e => setT({...t, heroTitle: e.target.value})} onBlur={commit}/></div>
      <div className="form-grp"><label className="form-lbl">Titre en italique (couleur or)</label>
        <input className="form-ctrl" value={t.heroTitleEm} onChange={e => setT({...t, heroTitleEm: e.target.value})} onBlur={commit}/></div>
      <div className="form-grp"><label className="form-lbl">Sous-titre / description</label>
        <textarea className="form-ctrl" rows="3" value={t.heroSub} onChange={e => setT({...t, heroSub: e.target.value})} onBlur={commit}/></div>
    </div>
  );
}

function ConfigGeneral({ siteCfg, save }) {
  const [v, setV] = useState(String(siteCfg.minCmd || 25));
  useEffect(() => { setV(String(siteCfg.minCmd || 25)); }, [siteCfg]);
  return (
    <div className="cfg-section">
      <div className="cfg-title">Paramètres généraux</div>
      <div className="form-grp"><label className="form-lbl">Commande minimum (€)</label>
        <input className="form-ctrl" type="number" min="0" step="1" value={v}
          onChange={e => setV(e.target.value)}
          onBlur={() => save({ ...siteCfg, minCmd: Number(v) || 0 })}/></div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   CATALOGUE ADMIN (tabs + products)
   ───────────────────────────────────────────── */
function ConfigCatalogue({ catalogue, save, showToast }) {
  const [activeTabId, setActiveTabId] = useState(catalogue.tabs[0] ? catalogue.tabs[0].id : "");

  useEffect(() => {
    if (catalogue.tabs.length === 0) { setActiveTabId(""); return; }
    if (!catalogue.tabs.find(t => t.id === activeTabId)) setActiveTabId(catalogue.tabs[0].id);
  }, [catalogue.tabs]);

  // ── tab management ──
  const addTab = () => {
    const name = window.prompt("Nom du nouvel onglet :");
    if (!name || !name.trim()) return;
    const nt = { id: uid(), name: name.trim() };
    save({ ...catalogue, tabs: [...catalogue.tabs, nt] });
    setActiveTabId(nt.id);
  };
  const renameTab = (id, name) => {
    save({ ...catalogue, tabs: catalogue.tabs.map(t => t.id === id ? { ...t, name } : t) });
  };
  const delTab = (id) => {
    if (!window.confirm("Supprimer cet onglet ? Les produits ne sont pas supprimés mais perdent cet onglet.")) return;
    const tabs = catalogue.tabs.filter(t => t.id !== id);
    const products = catalogue.products.map(p => ({ ...p, tabIds: (p.tabIds || []).filter(x => x !== id) }));
    save({ ...catalogue, tabs, products });
    if (activeTabId === id) setActiveTabId(tabs[0] ? tabs[0].id : "");
  };
  const moveTab = (id, dir) => {
    const i = catalogue.tabs.findIndex(t => t.id === id);
    const j = i + dir;
    if (i < 0 || j < 0 || j >= catalogue.tabs.length) return;
    const tabs = [...catalogue.tabs];
    [tabs[i], tabs[j]] = [tabs[j], tabs[i]];
    save({ ...catalogue, tabs });
  };

  // ── product management ──
  const addProduct = () => {
    if (!activeTabId) { showToast("Crée d'abord un onglet", "red"); return; }
    const np = { id: uid(), name: "Nouveau produit", desc: "", price: 0, photo: "", available: true, tabIds: [activeTabId] };
    save({ ...catalogue, products: [...catalogue.products, np] });
  };
  const updProduct = (id, fields) => {
    save({ ...catalogue, products: catalogue.products.map(p => p.id === id ? { ...p, ...fields } : p) });
  };
  const delProduct = (id) => {
    if (!window.confirm("Supprimer ce produit définitivement ?")) return;
    save({ ...catalogue, products: catalogue.products.filter(p => p.id !== id) });
  };
  const toggleTabOnProduct = (productId, tabId) => {
    const p = catalogue.products.find(x => x.id === productId);
    if (!p) return;
    const tabIds = p.tabIds && p.tabIds.includes(tabId)
      ? p.tabIds.filter(x => x !== tabId)
      : [...(p.tabIds || []), tabId];
    updProduct(productId, { tabIds });
  };

  const productsForActive = activeTabId
    ? catalogue.products.filter(p => (p.tabIds || []).includes(activeTabId))
    : [];

  return (
    <div>
      {/* Onglets */}
      <div className="cfg-section">
        <div className="cfg-title">Onglets du catalogue</div>
        <div className="cfg-sub">Créez, nommez, réordonnez vos onglets. Un produit peut apparaître dans plusieurs onglets.</div>
        {catalogue.tabs.map(t => (
          <div key={t.id} className={"cat-tab-row " + (t.id === activeTabId ? "active" : "")}>
            <button className="icon-btn" onClick={() => moveTab(t.id, -1)} title="Monter">▲</button>
            <button className="icon-btn" onClick={() => moveTab(t.id, +1)} title="Descendre">▼</button>
            <input value={t.name} onChange={e => renameTab(t.id, e.target.value)} />
            <button className="btn-sm" onClick={() => setActiveTabId(t.id)}>{t.id === activeTabId ? "✓ Actif" : "Voir produits"}</button>
            <button className="icon-btn d" onClick={() => delTab(t.id)} title="Supprimer">🗑</button>
          </div>
        ))}
        <div style={{marginTop:"14px"}}>
          <button className="btn-dark" onClick={addTab}>+ Nouvel onglet</button>
        </div>
      </div>

      {/* Produits */}
      {activeTabId && (
        <div className="cfg-section">
          <div className="cfg-title">Produits — {(catalogue.tabs.find(t => t.id === activeTabId) || {}).name}</div>
          <div className="cfg-sub">Photo : cliquez sur l'image pour téléverser. Cochez les onglets en bas pour qu'un produit apparaisse partout où il faut.</div>

          {productsForActive.length === 0 && (
            <div style={{padding:"24px",color:"rgba(255,255,255,.5)",textAlign:"center",fontSize:".88rem"}}>Aucun produit dans cet onglet. Ajoutez-en un ci-dessous.</div>
          )}

          {productsForActive.map(p => (
            <ProductRow
              key={p.id}
              product={p}
              tabs={catalogue.tabs}
              onUpdate={fields => updProduct(p.id, fields)}
              onDelete={() => delProduct(p.id)}
              onToggleTab={tabId => toggleTabOnProduct(p.id, tabId)}
              showToast={showToast}
            />
          ))}

          <div style={{marginTop:"14px"}}>
            <button className="btn-gold" onClick={addProduct}>+ Ajouter un produit</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProductRow({ product, tabs, onUpdate, onDelete, onToggleTab, showToast }) {
  const [draft, setDraft] = useState(product);
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  useEffect(() => { setDraft(product); }, [product.id, product.name, product.desc, product.price, product.photo, product.available]);

  const commit = (k) => { if (draft[k] !== product[k]) onUpdate({ [k]: draft[k] }); };
  const commitNumber = () => { const n = Number(draft.price) || 0; if (n !== product.price) onUpdate({ price: n }); };

  const onPickFile = () => fileRef.current && fileRef.current.click();
  const onFile = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    setUploading(true);
    const url = await sbUploadPhoto(f, "prod");
    setUploading(false);
    if (url) { onUpdate({ photo: url }); showToast("Photo uploadée ✓", "green"); }
    else showToast("Erreur d'upload", "red");
    e.target.value = "";
  };

  return (
    <div className="prod-card">
      <div className="prod-card-img" onClick={onPickFile} title="Cliquer pour changer la photo">
        {uploading
          ? <span style={{fontSize:".8rem"}}>…</span>
          : product.photo
            ? <img src={product.photo} alt={product.name}/>
            : <span>📷</span>}
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={onFile} />
      </div>
      <div className="prod-card-info">
        <input
          value={draft.name}
          onChange={e => setDraft({...draft, name: e.target.value})}
          onBlur={() => commit("name")}
          placeholder="Nom du produit"
        />
        <textarea
          value={draft.desc || ""}
          onChange={e => setDraft({...draft, desc: e.target.value})}
          onBlur={() => commit("desc")}
          placeholder="Description (visible au clic sur le produit)"
        />
        <div className="prod-card-meta">
          <input
            type="number" step="0.01" min="0"
            value={draft.price}
            onChange={e => setDraft({...draft, price: e.target.value})}
            onBlur={commitNumber}
            placeholder="Prix"
          />
          <span style={{color:"rgba(255,255,255,.5)"}}>€</span>
          <label style={{display:"flex",alignItems:"center",gap:"6px",fontSize:".8rem",color:"rgba(255,255,255,.7)"}}>
            <span className="switch">
              <input type="checkbox" checked={!!product.available} onChange={e => onUpdate({ available: e.target.checked })} />
              <span className="switch-slider"></span>
            </span>
            {product.available ? "Disponible" : "Indisponible"}
          </label>
        </div>
        <div className="prod-tab-pills">
          {tabs.map(t => (
            <span key={t.id}
              className={"prod-tab-pill " + ((product.tabIds || []).includes(t.id) ? "on" : "")}
              onClick={() => onToggleTab(t.id)}
              title="Cliquer pour ajouter/retirer ce produit de cet onglet"
            >{t.name}</span>
          ))}
        </div>
      </div>
      <div className="prod-card-actions">
        <button className="btn-sm d" onClick={onDelete}>🗑 Supprimer</button>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   APP ROOT
   ───────────────────────────────────────────── */
function App() {
  const [view, setView] = useState("site"); // site | login | bo | config
  const [siteCfg, setSiteCfg] = useState(DEFAULT_SITE_CONFIG);
  const [catalogue, setCatalogue] = useState(DEFAULT_CATALOGUE);
  const [orders, setOrders] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [toastMsg, setToastMsg] = useState("");
  const [toastKind, setToastKind] = useState("default");
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [pwd, setPwd] = useState("");
  const [pwdErr, setPwdErr] = useState("");
  const [loginNext, setLoginNext] = useState("bo");
  const [adminOk, setAdminOk] = useState(false);

  const showToast = (msg, kind) => { setToastMsg(msg); setToastKind(kind || "default"); };

  // Check admin session on mount
  useEffect(() => {
    setAdminOk(sessionStorage.getItem("ldd_admin") === "1");
  }, []);

  // Load config + catalogue from Supabase on boot
  useEffect(() => {
    (async () => {
      const cfg = await sbGet("site_config");
      if (cfg && typeof cfg === "object") {
        setSiteCfg({
          ...DEFAULT_SITE_CONFIG,
          ...cfg,
          contact: { ...DEFAULT_SITE_CONFIG.contact, ...(cfg.contact || {}) },
          texts:   { ...DEFAULT_SITE_CONFIG.texts,   ...(cfg.texts   || {}) },
          haltes:   Array.isArray(cfg.haltes)   && cfg.haltes.length   ? cfg.haltes   : DEFAULT_HALTES,
          creneaux: Array.isArray(cfg.creneaux) && cfg.creneaux.length ? cfg.creneaux : DEFAULT_CRENEAUX
        });
      } else {
        await sbSet("site_config", DEFAULT_SITE_CONFIG);
      }
      const cat = await sbGet("catalogue");
      if (cat && cat.tabs && cat.products) {
        setCatalogue({
          tabs: cat.tabs,
          products: cat.products.map(p => ({ available: true, tabIds: [], photo: "", desc: "", ...p }))
        });
      } else {
        await sbSet("catalogue", DEFAULT_CATALOGUE);
      }
      setLoaded(true);
    })();
  }, []);

  const refreshOrders = async () => { setOrders(await sbOrdersList()); };

  // Auto-load orders when entering BO
  useEffect(() => { if (view === "bo") refreshOrders(); }, [view]);

  const saveSiteCfg = async (next) => {
    setSiteCfg(next);
    const ok = await sbSet("site_config", next);
    showToast(ok ? "Configuration sauvegardée ✓" : "Erreur de sauvegarde", ok ? "green" : "red");
  };
  const saveCatalogue = async (next) => {
    setCatalogue(next);
    const ok = await sbSet("catalogue", next);
    showToast(ok ? "Catalogue sauvegardé ✓" : "Erreur de sauvegarde", ok ? "green" : "red");
  };

  const handleOrder = async ({ items, form, total, channel }) => {
    const order = {
      id: "CMD-" + Date.now(),
      client: form.name || "",
      phone: form.phone || "",
      items,
      halte: form.halte || "",
      creneau: form.creneau || "",
      date: form.date || todayISO(),
      total: Number(total) || 0,
      status: "new",
      notes: form.notes || "",
      boat: form.boat || "",
      channel: channel || "",
      created_at: new Date().toISOString()
    };
    await sbOrderInsert(order);
  };

  const goAdmin = (next) => {
    setLoginNext(next);
    if (sessionStorage.getItem("ldd_admin") === "1") { setAdminOk(true); setView(next); }
    else setView("login");
    setDrawerOpen(false);
  };

  const submitLogin = (e) => {
    if (e) e.preventDefault();
    if (pwd === "canal2025") {
      sessionStorage.setItem("ldd_admin", "1");
      setAdminOk(true);
      setView(loginNext);
      setPwd(""); setPwdErr("");
    } else {
      setPwdErr("Mot de passe incorrect");
    }
  };

  const logout = () => { sessionStorage.removeItem("ldd_admin"); setAdminOk(false); setView("site"); setDrawerOpen(false); };

  if (!loaded) {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--gold)",fontFamily:"var(--fd)",fontSize:"1.4rem"}}>
        🚢 Chargement…
      </div>
    );
  }

  return (
    <div>
      {/* NAV */}
      <nav className="nav">
        <div className="nav-logo" onClick={() => { setView("site"); setDrawerOpen(false); }}>
          <div className="nav-logo-mark">L&D</div>
          <div className="nav-logo-text">
            <div className="nav-logo-name">Lock and Dock</div>
            <div className="nav-logo-sub">Delivery</div>
          </div>
        </div>
        <div className="nav-right">
          <div className="nav-tabs-desktop" style={{display:"flex",gap:"4px",alignItems:"center"}}>
            <button className={"nav-tab " + (view === "site" ? "active" : "")} onClick={() => setView("site")}>Catalogue</button>
            <button className={"nav-tab " + (view === "bo" ? "active" : "")} onClick={() => goAdmin("bo")}>Back-office</button>
            <button className={"nav-tab " + (view === "config" ? "active" : "")} onClick={() => goAdmin("config")}>Config</button>
            {adminOk && view !== "site" && (
              <button className="nav-tab" onClick={logout}>↪ Quitter</button>
            )}
          </div>
          <button className="nav-menu-btn" onClick={() => setDrawerOpen(o => !o)} aria-label="Menu">☰</button>
        </div>
        <div className={"nav-drawer " + (drawerOpen ? "open" : "")}>
          <button className={"nav-tab " + (view === "site" ? "active" : "")} onClick={() => { setView("site"); setDrawerOpen(false); }}>🛒 Catalogue</button>
          <button className={"nav-tab " + (view === "bo" ? "active" : "")} onClick={() => goAdmin("bo")}>📋 Back-office</button>
          <button className={"nav-tab " + (view === "config" ? "active" : "")} onClick={() => goAdmin("config")}>⚙️ Config</button>
          {adminOk && (
            <button className="nav-tab" onClick={logout}>↪ Quitter admin</button>
          )}
        </div>
      </nav>

      {view === "site" && (
        <SitePage
          siteCfg={siteCfg}
          catalogue={catalogue}
          onCmdSubmit={handleOrder}
          showToast={showToast}
        />
      )}

      {view === "login" && (
        <div className="page">
          <form className="login-box" onSubmit={submitLogin}>
            <div className="login-title">🔐 Espace administrateur</div>
            <div className="login-sub">Saisissez le mot de passe pour accéder.</div>
            <input
              className="login-input"
              type="password"
              autoFocus
              value={pwd}
              onChange={e => { setPwd(e.target.value); setPwdErr(""); }}
              placeholder="Mot de passe"
            />
            {pwdErr && <div style={{color:"var(--red)",fontSize:".82rem",marginBottom:"10px"}}>{pwdErr}</div>}
            <button type="submit" className="btn-gold" style={{width:"100%"}}>Connexion</button>
            <button type="button" className="footer-link" onClick={() => setView("site")}>← Retour au site</button>
          </form>
        </div>
      )}

      {view === "bo" && adminOk && (
        <BackOffice orders={orders} refreshOrders={refreshOrders} showToast={showToast}/>
      )}

      {view === "config" && adminOk && (
        <ConfigPage
          siteCfg={siteCfg}
          catalogue={catalogue}
          saveSiteCfg={saveSiteCfg}
          saveCatalogue={saveCatalogue}
          showToast={showToast}
        />
      )}

      <Toast msg={toastMsg} kind={toastKind} onDone={() => setToastMsg("")}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
