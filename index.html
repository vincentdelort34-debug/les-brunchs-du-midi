  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:  #f5f0e6;
      --linen:  #ede8dc;

      --parch:  #e8e0d0;

      --red:    #c0392b;
      --orange: #e67e22;

    html,body,#root { min-height:100vh; }
    body { font-family:var(--fs); background:var(--dark); color:var(--cream);
           padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }

    /* ── NAV ── */

           border-bottom:1px solid rgba(255,255,255,.08); padding:0 24px; height:68px;
           display:flex; align-items:center; justify-content:space-between; gap:12px; }

    .nav-logo-sub { font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-top:2px; }
    .nav-badge-count { display:inline-flex; align-items:center; justify-content:center; background:var(--canal); color:white; border-radius:50%; width:18px; height:18px; font-size:.62rem; font-weight:700; margin-left:5px; }

    .nav-search { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); border-radius:50px; padding:8px 14px; font-size:.82rem; color:rgba(255,255,255,.5); cursor:pointer; transition:all .2s; min-width:140px; }

    .nav-cart { position:relative; width:40px; height:40px; border-radius:50%; background:var(--dark); display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; flex-shrink:0; transition:background .2s; }
    .nav-cart:hover { background:var(--dark2); }
    .nav-cart-count { position:absolute; top:-4px; right:-4px; background:var(--gold); color:white; border-radius:50%; width:18px; height:18px; font-size:.6rem; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .nav-tabs { display:flex; gap:2px; align-items:center; }
    .nav-tab { padding:7px 12px; border-radius:6px; border:none; font-family:var(--fs); font-size:.76rem; font-weight:500; cursor:pointer; transition:all .2s; background:transparent; color:rgba(255,255,255,.5); white-space:nowrap; }
    .nav-tab.active { background:rgba(255,255,255,.12); color:var(--white); }
    .nav-tab:hover:not(.active) { background:rgba(255,255,255,.07); color:var(--white); }
    .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--red); margin-left:4px; vertical-align:middle; }
    .nav-menu-btn { display:none; background:none; border:none; cursor:pointer; padding:8px; font-size:1.1rem; color:var(--dark); flex-shrink:0; }
    .nav-drawer { display:none; position:fixed; top:68px; right:0; background:var(--white); border-left:1px solid var(--sand); border-bottom:1px solid var(--sand); padding:12px; border-radius:0 0 0 12px; box-shadow:var(--sh2); z-index:99; flex-direction:column; gap:6px; min-width:180px; }

    .hero-tag { font-size:.65rem; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:10px; position:relative; }

    .hero-cta { display:inline-flex; align-items:center; gap:10px; background:#25d366; color:var(--white); padding:14px 28px; border-radius:4px; font-weight:600; font-size:.88rem; text-decoration:none; transition:all .25s; box-shadow:0 6px 24px rgba(37,211,102,.35); letter-spacing:.02em; position:relative; }
    .hero-cta:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(37,211,102,.45); }
    .hero-sms { display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.85); padding:12px 24px; border-radius:4px; font-size:.85rem; text-decoration:none; transition:all .2s; position:relative; letter-spacing:.01em; }
    .hero-sms:hover { background:rgba(255,255,255,.18); }
    .hero-btns { display:flex; flex-direction:column; align-items:center; gap:12px; position:relative; }

    /* ── CATÉGORIES ONGLETS ── */
    .cat-nav { background:var(--dark2); border-bottom:1px solid rgba(255,255,255,.08); overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; position:sticky; top:68px; z-index:90; }

    .cat-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    .cat-tab:hover:not(.active) { color:rgba(255,255,255,.8); }
    .cat-tab-ico { font-size:1.1rem; }

    /* ── SECTION TITRE ── */
    .cat-section-title { padding:40px 24px 0; }
    .cat-section-title h2 { font-family:var(--fd); font-size:clamp(2rem,4vw,3rem); font-weight:400; line-height:1.1; letter-spacing:-.01em; margin-bottom:4px; color:var(--cream); }
    .cat-section-title .cat-count { font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.35); margin-bottom:24px; }
    .cat-divider { height:1px; background:rgba(255,255,255,.08); margin:0 24px 8px; }

    /* ── LISTE PRODUITS (style référence) ── */
    .products-list { padding:0 24px 40px; }
    .product-item { display:flex; align-items:flex-start; gap:16px; padding:24px 0; border-bottom:1px solid rgba(255,255,255,.07); transition:background .15s; cursor:pointer; }
    .product-item:last-child { border-bottom:none; }
    .product-item:hover { background:rgba(255,255,255,.03); margin:0 -24px; padding:24px; }
    .product-img { width:90px; height:90px; border-radius:var(--r); object-fit:cover; background:rgba(255,255,255,.07); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:2rem; overflow:hidden; border:1px solid rgba(255,255,255,.08); }
    .product-img img { width:100%; height:100%; object-fit:cover; }
    .product-info { flex:1; min-width:0; }
    .product-badges { display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
    .product-badge { font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; padding:3px 8px; border-radius:2px; font-weight:600; }
    .product-badge.bestseller { background:var(--gold); color:white; }
    .product-badge.local { background:rgba(255,255,255,.08); color:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.15); }
    .product-badge.limited { background:#fff3cd; color:#856404; }
    .product-name { font-family:var(--fd); font-size:1.25rem; font-weight:500; line-height:1.2; margin-bottom:4px; color:var(--cream); }
    .product-desc { font-size:.8rem; color:rgba(255,255,255,.45); line-height:1.5; margin-bottom:10px; }

    .product-price span { font-size:.75rem; font-weight:400; color:rgba(255,255,255,.4); margin-left:3px; font-family:var(--fs); }
    .product-qty { display:flex; align-items:center; gap:8px; }

    .qty-pill { display:flex; align-items:center; gap:0; background:var(--dark); border-radius:var(--r); overflow:hidden; }
    .qty-pill button { width:34px; height:36px; background:none; border:none; color:white; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .qty-pill button:hover { background:rgba(255,255,255,.1); }
    .qty-pill span { color:white; font-weight:600; font-size:.88rem; min-width:24px; text-align:center; font-family:var(--fd); }

    .extra-card:hover { background:rgba(255,255,255,.1); }
    .extra-ico { font-size:1.4rem; flex-shrink:0; }
    .extra-lbl { font-size:.82rem; font-weight:500; color:var(--white); line-height:1.2; }
    .extra-prc { font-family:var(--fd); font-size:1rem; font-weight:600; color:var(--gold); }
    .extra-qty { display:flex; align-items:center; gap:5px; margin-left:auto; flex-shrink:0; }

    .extra-qty span { font-size:.88rem; font-weight:600; color:var(--gold); min-width:16px; text-align:center; }

    /* ── FORMULAIRE COMMANDE ── */
    .order-section { padding:40px 24px; background:var(--dark2); border-top:1px solid rgba(255,255,255,.08); }

    .order-sub { font-size:.8rem; color:rgba(255,255,255,.4); margin-bottom:28px; }

    .btn-wa:disabled { opacity:.5; cursor:not-allowed; }
    .btn-wa:not(:disabled):hover { background:#1ea952; transform:translateY(-1px); }

    /* ── FOOTER ── */
    .site-footer { background:var(--dark); padding:48px 24px; text-align:center; }

    .page { padding:28px 24px; max-width:1100px; margin:0 auto; color:var(--cream); }

    .hist-badge.del { background:#e0e7ff; color:#3730a3; }
    .stock-tag { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:2px; font-size:.72rem; font-weight:600; }
    .stock-ok { background:#d1fae5; color:#065f46; }
    .stock-warn { background:#fef3c7; color:#92400e; }
    .stock-danger { background:#fee2e2; color:#991b1b; }
    .modal-overlay { position:fixed; inset:0; background:rgba(28,26,23,.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal { background:var(--dark2); border:1px solid rgba(255,255,255,.12); border-radius:var(--r); padding:28px; width:100%; max-width:480px; box-shadow:var(--sh2); color:var(--cream); }
    .modal-title { font-family:var(--fd); font-size:1.5rem; font-weight:500; margin-bottom:20px; }
    .cfg-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:28px; border-bottom:1px solid var(--sand); padding-bottom:16px; }
    .cfg-tab { padding:8px 16px; border-radius:var(--r); border:1.5px solid var(--sand); background:var(--white); color:var(--muted); font-family:var(--fs); font-size:.8rem; cursor:pointer; transition:all .2s; }
    .cfg-tab.active { background:var(--dark); color:white; border-color:var(--dark); }
    .cfg-section { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:var(--r); padding:24px; margin-bottom:20px; }
    .cfg-title { font-family:var(--fd); font-size:1.35rem; font-weight:500; margin-bottom:4px; color:var(--cream); }
    .cfg-sub { font-size:.8rem; color:rgba(255,255,255,.4); margin-bottom:20px; }
    .cfg-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    .cfg-color-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--linen); }
    .cfg-color-row:last-child { border-bottom:none; }
    .cfg-pack-row { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--linen); }
    .cfg-pack-ico { font-size:1.5rem; width:36px; text-align:center; }
    .cfg-pack-name { font-weight:500; font-size:.88rem; }
    .cfg-save-btn { background:var(--dark); color:white; border:none; padding:11px 22px; border-radius:var(--r); font-size:.84rem; cursor:pointer; font-family:var(--fs); transition:background .2s; margin-top:16px; }
    .cfg-save-btn:hover { background:var(--dark2); }
    .cfg-list-item { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--linen); }
    .cfg-list-item input { flex:1; padding:6px 10px; border:1.5px solid rgba(255,255,255,.12); border-radius:var(--r); font-family:var(--fs); font-size:.84rem; background:rgba(255,255,255,.06); color:var(--cream); }
    .cfg-del-btn { background:none; border:none; color:var(--red); cursor:pointer; font-size:.9rem; padding:4px 6px; opacity:.7; }
    .cfg-del-btn:hover { opacity:1; }
    .live-preview { background:var(--linen); border-radius:var(--r); padding:16px; margin-top:16px; }
    .preview-hero { background:var(--dark); border-radius:4px; padding:20px; text-align:center; color:white; margin-bottom:8px; }
    .preview-title { font-family:var(--fd); font-size:1.4rem; font-weight:400; }
    .login-box { max-width:380px; margin:80px auto; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:var(--r); padding:36px; text-align:center; }
    .login-title { font-family:var(--fd); font-size:1.8rem; margin-bottom:8px; }
    .login-sub { font-size:.82rem; color:var(--muted); margin-bottom:24px; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 22px; border-radius:var(--r); font-size:.84rem; font-weight:500; z-index:999; box-shadow:var(--sh2); opacity:0; transition:opacity .3s; pointer-events:none; color:white; font-family:var(--fs); }
    .toast.show { opacity:1; }
    .toast.green { background:var(--green); }
    .toast.red { background:var(--red); }
    .toast.default { background:var(--dark); }

    /* ── COMMENT ÇA MARCHE ── */
    .how-section { background:var(--dark2); padding:56px 24px; border-top:1px solid rgba(255,255,255,.08); }
    .how-title { font-family:var(--fd); font-size:clamp(1.8rem,3.5vw,2.6rem); font-weight:400; text-align:center; color:var(--cream); margin-bottom:8px; }
    .how-subtitle { text-align:center; font-size:.8rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); margin-bottom:40px; opacity:.7; }
    .how-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; max-width:900px; margin:0 auto; }
    .how-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09); border-radius:var(--r); padding:32px 24px; text-align:center; position:relative; }
    .how-card::before { content:attr(data-step); position:absolute; top:-14px; left:50%; transform:translateX(-50%); background:var(--gold); color:var(--dark); font-size:.65rem; font-weight:700; letter-spacing:.1em; padding:3px 10px; border-radius:50px; }
    .how-ico { font-size:2.4rem; margin-bottom:16px; display:block; }
    .how-card-title { font-family:var(--fd); font-size:1.2rem; font-weight:500; color:var(--cream); margin-bottom:10px; }
    .how-card-desc { font-size:.82rem; color:rgba(255,255,255,.5); line-height:1.6; }

    /* ── FAQ ── */
    .faq-section { background:var(--dark); padding:56px 24px; border-top:1px solid rgba(255,255,255,.08); }
    .faq-title { font-family:var(--fd); font-size:clamp(1.8rem,3.5vw,2.6rem); font-weight:400; text-align:center; color:var(--cream); margin-bottom:40px; }
    .faq-list { max-width:720px; margin:0 auto; }
    .faq-item { border-bottom:1px solid rgba(255,255,255,.08); }
    .faq-q { width:100%; background:none; border:none; color:var(--cream); font-family:var(--fs); font-size:.92rem; font-weight:500; text-align:left; padding:18px 0; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:16px; transition:color .2s; }
    .faq-q:hover { color:var(--gold); }
    .faq-q .faq-arrow { font-size:.8rem; color:var(--gold); transition:transform .25s; flex-shrink:0; }
    .faq-q.open .faq-arrow { transform:rotate(180deg); }
    .faq-a { overflow:hidden; max-height:0; transition:max-height .3s ease, padding .3s ease; }
    .faq-a.open { max-height:200px; }
    .faq-a-inner { padding:0 0 18px; font-size:.85rem; color:rgba(255,255,255,.55); line-height:1.7; border-left:3px solid var(--gold); padding-left:16px; margin-left:2px; }

    /* ── MENTIONS LÉGALES MODAL ── */
    .mentions-modal { background:var(--dark2); border:1px solid rgba(255,255,255,.14); border-radius:var(--r); padding:32px; width:100%; max-width:520px; box-shadow:var(--sh2); color:var(--cream); }
    .mentions-modal h2 { font-family:var(--fd); font-size:1.5rem; font-weight:500; margin-bottom:20px; color:var(--gold); }
    .mentions-modal p { font-size:.85rem; color:rgba(255,255,255,.65); line-height:1.75; margin-bottom:10px; }
    .mentions-modal a { color:var(--canal2); text-decoration:none; }
    .mentions-close { margin-top:20px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); color:var(--cream); padding:9px 22px; border-radius:var(--r); font-family:var(--fs); font-size:.84rem; cursor:pointer; transition:background .2s; }
    .mentions-close:hover { background:rgba(255,255,255,.18); }
    .footer-legal-link { font-size:.72rem; color:rgba(255,255,255,.3); text-decoration:none; cursor:pointer; background:none; border:none; font-family:var(--fs); transition:color .2s; margin-top:10px; display:inline-block; }
    .footer-legal-link:hover { color:var(--gold); }

    @media(max-width:640px){
      .form-row { grid-template-columns:1fr; }
      .mv-grid { grid-template-columns:1fr 1fr; }

      .nav-logo-name { font-size:1rem; }
      .nav-search { display:none; }

      .nav-menu-btn { display:flex !important; align-items:center; justify-content:center; }
      .hero h1 { font-size:2.2rem; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .extras-grid { grid-template-columns:1fr 1fr; }
      .cat-tab { padding:16px 16px; font-size:.72rem; }
      thead th:nth-child(4),td:nth-child(4),thead th:nth-child(5),td:nth-child(5) { display:none; }
      .cfg-grid2 { grid-template-columns:1fr; }
      .product-item:hover { margin:0; padding:24px 0; background:none; }
      .how-grid { grid-template-columns:1fr; gap:32px; }
    }

// Lire la config depuis Supabase
async function loadConfigFromDB() {
  try {
    const res = await fetch(SUPABASE_URL+"/rest/v1/config?select=value&key=eq.site_config", { headers: SB_HEADERS });
    if (!res.ok) return null;
    const data = await res.json();
    if (data.length > 0) return JSON.parse(data[0].value);
    return null;
  } catch(e) { return null; }
}

// Sauvegarder la config dans Supabase
async function saveConfigToDB(cfg) {
  try {
    const payload = { key: "site_config", value: JSON.stringify(cfg) };
    // Upsert — crée ou met à jour
    await fetch(SUPABASE_URL+"/rest/v1/config", {
      method: "POST",
      headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates" },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn("Config save error:", e); }
}

async function uploadPhoto(file, packId) {
  const ext = file.name.split(".").pop().toLowerCase();
  const path = packId + "." + ext;
  const bucketEncoded = encodeURIComponent(BUCKET);
  const res = await fetch(SUPABASE_URL + "/storage/v1/object/" + bucketEncoded + "/" + path, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": file.type,
      "x-upsert": "true"
    },
    body: file
  });
  if (!res.ok) {
    const err = await res.text();
    console.error("Upload error:", res.status, err);
    throw new Error("Upload failed: " + res.status);
  }
  return SUPABASE_URL + "/storage/v1/object/public/" + bucketEncoded + "/" + path;
}

// ─── DÉDUCTION STOCK AUTO ─────────────────────────────────
function deductStock(order, stockState, setStockState) {
  const pack = PACKS.find(p => p.id === order.packId);
  const newProduits = stockState.produits.map(p => ({...p}));
  const newMv = [];

  const deduct = (nom, qty) => {
    const idx = newProduits.findIndex(p => p.nom === nom);
    if (idx < 0) return;
    newProduits[idx].stock = Math.max(0, newProduits[idx].stock - qty);
    newMv.push({id:Date.now()+Math.random(), produit:nom, unite:newProduits[idx].unite, type:"out", qty, note:`Auto — Cmd ${order.id} (${order.client})`, date:nowStr(), auto:true});
  };

  if (pack) Object.entries(pack.ingredients).forEach(([nom,qty]) => deduct(nom, qty));
  order.extras.forEach(lbl => {
    const e = EXTRAS.find(x => x.label === lbl);
    if (e && e.stockRef) deduct(e.stockRef, 1);
  });

  const ns = {...stockState, produits:newProduits, mouvements:[...newMv,...stockState.mouvements].slice(0,200)};
  lsSet(SK_STOCK, ns);
  setStockState(ns);

  const alerts = newProduits.filter(p => getStatus(p.stock,p.seuil)!=="ok" && newMv.find(m=>m.produit===p.nom));
  if (alerts.length) showToast(`⚠️ Stock bas : ${alerts.slice(0,2).map(p=>p.nom).join(", ")}`, "red");
  else if (newMv.length) showToast(`📦 ${newMv.length} produit${newMv.length>1?"s":""} débité${newMv.length>1?"s":""}`, "green");
}

//  CATALOGUE
// ═══════════════════════════════════════════════════════
function Catalogue({appCfg, lang, t, isAdmin, setPending, setShowLogin}) {
  t = t || LANGS.fr;
  const [cat,setCat]=useState("all");
  // qty: {packId: number}
  const [packQty,setPackQty]=useState({});
  const [extraQty,setExtraQty]=useState({});
  const [form,setForm]=useState({name:"",phone:"",halte:"",creneau:"",notes:"",deliveryLat:null,deliveryLng:null});
  const [showMentions,setShowMentions]=useState(false);
  const [showMap,setShowMap]=useState(false);

  const {packs:MPACKS, haltes:MHALTES, creneaux:MCRENEAUX, minCmd, wa:WA_NUM, cfg:cfgBase} = getMergedData();
  const cfg = appCfg || cfgBase;
  const MPACKS2 = cfg.packPhotos ? MPACKS.map(p=>({...p, photo:(cfg.packPhotos||{})[p.id]||""})) : MPACKS;
  const MWA = `https://wa.me/${WA_NUM}`;
  const list=cat==="all"?MPACKS2:MPACKS2.filter(p=>p.cat===cat);
  
  const getPQty=id=>packQty[id]||0;
  const getEQty=id=>extraQty[id]||0;
  
  const addPack=p=>setPackQty(prev=>({...prev,[p.id]:(prev[p.id]||0)+1}));
  const remPack=p=>setPackQty(prev=>{const n=(prev[p.id]||0)-1; if(n<=0){const r={...prev};delete r[p.id];return r;} return {...prev,[p.id]:n};});
  const addExtra=e=>setExtraQty(prev=>({...prev,[e.id]:(prev[e.id]||0)+1}));
  const remExtra=e=>setExtraQty(prev=>{const n=(prev[e.id]||0)-1; if(n<=0){const r={...prev};delete r[e.id];return r;} return {...prev,[e.id]:n};});

  // Listes avec quantités pour le récap et l'envoi
  const selPacks=PACKS.filter(p=>getPQty(p.id)>0);
  const selExtras=EXTRAS.filter(e=>getEQty(e.id)>0);
  const totalPacks=PACKS.reduce((s,p)=>s+p.price*getPQty(p.id),0);
  const totalExtras=EXTRAS.reduce((s,e)=>s+e.price*getEQty(e.id),0);
  const total=totalPacks+totalExtras;
  const hasItems=total>0;
  const formOk=form.name&&form.phone&&form.halte&&form.creneau;
  const canOrder=total>=minCmd&&formOk;

  // Envoie la commande à Google Sheets + retourne le lien WhatsApp
  const sendOrder = () => {
    const id = `LD${new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}).replace("/","")}-${Math.floor(Math.random()*900+100)}`;
    
    // Construire le message WhatsApp
    const txt=[
      `🛶 *Commande Lock & Dock Delivery*`,`Réf. ${id}`,``,
      `👤 *Client :* ${form.name}`,`📞 *Tél :* ${form.phone}`,
      `📍 *Halte :* ${form.halte}`,`🕐 *Créneau :* ${form.creneau}`,``,
      `📦 *Packs :*`,...selPacks.map(p=>`  • ${getPQty(p.id)}× ${p.label} — ${p.price*getPQty(p.id)} €`),
      ...(selExtras.length?[``,`➕ *Extras :*`,...selExtras.map(e=>`  • ${getEQty(e.id)}× ${e.label} — ${e.price*getEQty(e.id)} €`)]:[]),
      ``,`💰 *Total : ${total} €*`,...(form.notes?[``,`📝 ${form.notes}`]:[]),
      ...(form.deliveryLat?[``,`📍 *Position GPS :* ${form.deliveryLat.toFixed(5)}, ${form.deliveryLng.toFixed(5)}`,`🗺️ https://www.google.com/maps?q=${form.deliveryLat},${form.deliveryLng}`]:[]),
    ].join("\n");
    
    // Ouvrir WhatsApp IMMÉDIATEMENT (doit être dans le même clic)
    window.open(`${MWA}?text=${encodeURIComponent(txt)}`, "_blank");

    // Envoyer à Google Sheets en arrière-plan
    if (GOOGLE_SCRIPT_URL) {
      const payload = {
        id, client:form.name, phone:form.phone, halte:form.halte,
        creneau:form.creneau, notes:form.notes, gpsLat:form.deliveryLat, gpsLng:form.deliveryLng,
        packs:selPacks.map(p=>({label:`${getPQty(p.id)}× ${p.label}`,price:p.price*getPQty(p.id),id:p.id})),
        extras:selExtras.map(e=>({label:`${getEQty(e.id)}× ${e.label}`,price:e.price*getEQty(e.id)})),
        total,
      };
      fetch(GOOGLE_SCRIPT_URL, {
        method:"POST", mode:"no-cors",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload),
      }).then(()=>showToast(`✅ Commande ${id} enregistrée`,"green"))
        .catch(err=>console.warn("Google Sheets:",err));
    }
  };

  return (<>
    {/* ── NAV ── */}
    {/* Nav is rendered in App */}

    {/* ── HERO ── */}
    <div className="hero">
      {(cfg.logoUrl||LOGO_MD)&&<img className="hero-logo" src={cfg.logoUrl||LOGO_MD} alt="Lock & Dock Delivery"/>}
      <div className="hero-tag">{cfg.heroTag||"⚓ Canal du Midi · Lock & Dock Delivery"}</div>
      <h1>{cfg.heroTitle||"Vos saveurs"}<br/><em>{cfg.heroTitleEm||"livrées à bord"}</em></h1>
      <p>{cfg.heroSub||"Apéros, petits-déjeuners et essentiels livrés directement sur votre ponton, entre Le Somail et Béziers."}</p>
      <div className="hero-btns">
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
          <a className="hero-cta" href={MWA} target="_blank" rel="noreferrer"><WaIco/> {t.orderWA}</a>
          <span style={{fontSize:"0.75rem",color:"rgba(255,255,255,0.6)"}}>{t.heroCTASub}</span>
        </div>
        <a className="hero-sms" href={"sms:+"+WA_NUM}>💬 {t.orderSMS}</a>
      </div>
      <div className="hero-wave"/>
    </div>

    {/* ── COMMENT ÇA MARCHE ── */}
    <div className="how-section">
      <div className="how-title">{t.howTitle}</div>
      <div className="how-subtitle">3 étapes simples</div>
      <div className="how-grid">
        <div className="how-card" data-step="01">
          <span className="how-ico">🛒</span>
          <div className="how-card-title">{t.howStep1Title}</div>
          <div className="how-card-desc">{t.howStep1Desc}</div>
        </div>
        <div className="how-card" data-step="02">
          <span className="how-ico">📍</span>
          <div className="how-card-title">{t.howStep2Title}</div>
          <div className="how-card-desc">{t.howStep2Desc}</div>
        </div>
        <div className="how-card" data-step="03">
          <span className="how-ico">🚤</span>
          <div className="how-card-title">{t.howStep3Title}</div>
          <div className="how-card-desc">{t.howStep3Desc}</div>
        </div>
      </div>
    </div>

    {/* ── ONGLETS CATÉGORIES ── */}
    <div className="cat-nav">
      <div className="cat-nav-inner">
        {[
          {id:"all", label:t.allPacks, ico:"📦"},
          {id:"apero", label:t.apero, ico:"🥂"},
          {id:"petitdej", label:t.petitdej, ico:"☀️"},
          {id:"essentiel", label:t.essentiels, ico:"⚓"},
        ].map(c=>(
          <button key={c.id} className={"cat-tab"+(cat===c.id?" active":"")} onClick={()=>setCat(c.id)}>
            <span className="cat-tab-ico">{c.ico}</span> {c.label}
          </button>
        ))}
      </div>
    </div>

    {/* ── TITRE SECTION ── */}
    <div className="cat-section-title">
      <h2>{cat==="all"?t.allPacks:cat==="apero"?t.apero:cat==="petitdej"?t.petitdej:t.essentiels}</h2>
      <div className="cat-count">{list.length} PRODUITS</div>
    </div>
    <div className="cat-divider"/>

    {/* ── LISTE PRODUITS ── */}
    <div className="products-list">
      {list.map(p=>(
        <div key={p.id} className="product-item">
          <div className="product-img">
            {p.photo
              ? <img src={p.photo} alt={p.label}/>
              : <span>{p.ico}</span>}
          </div>
          <div className="product-info">
            <div className="product-badges">
              {p.badge&&<span className={"product-badge "+(p.badge.includes("Best")?"bestseller":"local")}>{p.badge}</span>}
            </div>
            <div className="product-name">{p.label}</div>
            <div className="product-desc">{p.sub}</div>
            <div className="product-footer">
              <div>
                <div className="product-price">{(p.price*(getPQty(p.id)||1)).toFixed(2).replace('.',',')} <span>€ {t.perUnit}</span></div>
              </div>
              <div className="product-qty">
                {getPQty(p.id)>0 ? (
                  <div className="qty-pill">
                    <button onClick={()=>remPack(p)}>−</button>
                    <span>{getPQty(p.id)}</span>
                    <button onClick={()=>addPack(p)}>+</button>
                  </div>
                ) : (
                  <button className="btn-add" onClick={()=>addPack(p)}>+ AJOUTER</button>
                )}
              </div>
            </div>
          </div>
        </div>
      ))}
    </div>

    {/* ── EXTRAS ── */}
    <div className="extras-section">
      <div className="extras-title">{t.extras}</div>
      <div className="extras-sub">{t.extrasub}</div>
      <div className="extras-grid">
        {EXTRAS.map(e=>(
          <div key={e.id} className={"extra-card"+(getEQty(e.id)>0?" sel":"")}>
            <span className="extra-ico">{e.ico}</span>
            <div style={{flex:1}}>
              <div className="extra-lbl">{e.label}</div>
              <div className="extra-prc">{e.price} €</div>
            </div>
            <div className="extra-qty">
              {getEQty(e.id)>0&&<button onClick={()=>remExtra(e)}>−</button>}
              {getEQty(e.id)>0&&<span>{getEQty(e.id)}</span>}
              <button onClick={()=>addExtra(e)} style={{background:"rgba(184,150,90,.3)"}}>+</button>
            </div>
          </div>
        ))}
      </div>
    </div>

    {/* ── FORMULAIRE COMMANDE ── */}
    {hasItems&&(
      <div className="order-section">
        <h2>{t.recap}</h2>
        <div className="order-sub">{total} € · {selPacks.length+selExtras.length} article(s)</div>
        <div className="order-lines">
          {selPacks.map(p=>(
            <div className="order-line" key={p.id}>
              <span>{p.ico} {getPQty(p.id)>1&&<span className="tag">{getPQty(p.id)}×</span>} {p.label}</span>
              <strong>{p.price*getPQty(p.id)} €</strong>
            </div>
          ))}
          {selExtras.map(e=>(
            <div className="order-line" key={e.id}>
              <span>{e.ico} {getEQty(e.id)>1&&<span className="tag">{getEQty(e.id)}×</span>} {e.label}</span>
              <strong>{e.price*getEQty(e.id)} €</strong>
            </div>
          ))}
          <div className="order-total"><span>{t.total}</span><span>{total} €</span></div>
        </div>
        {total<minCmd&&<p className="notice warn">⚠️ {t.minOrder} : {minCmd} € ({t.delivery})</p>}
        {total>=minCmd&&(<>
          <div className="form-row">
            <div className="form-grp"><label className="form-lbl">{t.name}</label><input className="form-ctrl" placeholder={t.nameph} value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div className="form-grp"><label className="form-lbl">{t.phone}</label><input className="form-ctrl" placeholder={t.phoneph} value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
          </div>
          <div className="form-row">
            <div className="form-grp"><label className="form-lbl">{t.halte}</label><select className="form-ctrl" value={form.halte} onChange={e=>setForm({...form,halte:e.target.value})}><option value="">{t.chooseHalte}</option>{MHALTES.map(h=><option key={h}>{h}</option>)}</select></div>
            <div className="form-grp"><label className="form-lbl">{t.creneau}</label><select className="form-ctrl" value={form.creneau} onChange={e=>setForm({...form,creneau:e.target.value})}><option value="">{t.chooseCreneau}</option>{MCRENEAUX.map(c=><option key={c}>{c}</option>)}</select></div>
          </div>
          <div className="form-grp"><label className="form-lbl">{t.notes}</label><textarea className="form-ctrl" placeholder={t.notesph} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
          <div className="form-grp" style={{marginTop:8}}>
            <button type="button" className={"delivery-loc-btn"+(form.deliveryLat?" has-pin":"")} onClick={()=>setShowMap(true)}>
              {form.deliveryLat ? "📍 Position marquée — modifier" : "📍 Où vous livrer sur le canal ?"}
            </button>
            {form.deliveryLat&&<p style={{fontSize:".75rem",color:"var(--muted)",marginTop:4,textAlign:"center"}}>GPS : {form.deliveryLat.toFixed(5)}, {form.deliveryLng.toFixed(5)}</p>}
          </div>
          {canOrder
            ? <button className="btn-wa" onClick={sendOrder}><WaIco size={20}/> {t.sendOrder} — {total} €</button>
            : <button className="btn-wa" disabled><WaIco size={20}/> {t.sendOrder} — {total} €</button>}
          {!formOk&&<p className="notice info" style={{marginTop:8}}>{t.fillFields}</p>}
          {cfg.email&&<p className="notice info" style={{marginTop:8}}>📧 <a href={"mailto:"+cfg.email} style={{color:"var(--canal)"}}>{cfg.email}</a></p>}
        </>)}
      </div>
    )}

    {/* ── FAQ ── */}
    <FAQSection t={t}/>

    {/* ── FOOTER ── */}
    <footer className="site-footer">
      <div className="footer-brand">Lock &amp; Dock</div>
      <div className="footer-sub">Delivery · Livraison à bord</div>
      <div className="footer-divider"/>
      <div className="footer-info">
        {cfg.footerText||"Livraison dans l'heure · Canal du Midi · Le Somail → Béziers"}
      </div>
      <div style={{marginTop:16,display:"flex",alignItems:"center",justifyContent:"center",gap:16}}>
        <button className="footer-legal-link" onClick={()=>setShowMentions(true)}>
          {t.mentionsLink||"Mentions légales"}
        </button>
        {!isAdmin&&(
          <button className="footer-legal-link" onClick={()=>{setPending("backoffice");setShowLogin(true);}} title="Admin">
            🔒
          </button>
        )}
      </div>
    </footer>

    {/* ── MENTIONS LÉGALES ── */}
    {showMentions&&<MentionsModal t={t} onClose={()=>setShowMentions(false)}/>}

  {/* ── CARTE LIVRAISON ── */}
  {showMap&&(
    <DeliveryMapModal
      onConfirm={(lat,lng)=>{setForm({...form,deliveryLat:lat,deliveryLng:lng});setShowMap(false);}}
      onClose={()=>setShowMap(false)}
      initialLat={form.deliveryLat}
      initialLng={form.deliveryLng}
    />
  )}
  </>);
}

function Backoffice({stockState,setStockState}) {
  const [orders,setOrders]=useState(()=>lsGet(SK_ORDERS,MOCK_ORDERS));
  const [fstat,setFstat]=useState("all");
  const [newOrd,setNewOrd]=useState({client:"",phone:"",pack:"",packId:"",halte:"",creneau:""});
  const [loading,setLoading]=useState(false);
  const [lastSync,setLastSync]=useState(null);

  useEffect(()=>{ lsSet(SK_ORDERS,orders); },[orders]);

  // Charger les commandes depuis Google Sheets
  const syncFromSheets = async () => {
    if (!GOOGLE_SCRIPT_URL) { showToast("URL Google Script non configurée","red"); return; }
    setLoading(true);
    try {
      const res = await fetch(GOOGLE_SCRIPT_URL+"?action=getOrders", {mode:"cors"});
      if (!res.ok) throw new Error("HTTP "+res.status);
      const data = await res.json();
      if (data.success && data.orders && data.orders.length > 0) {
        const sheetsOrders = data.orders.map(o => ({
          id: o.id||"", client: o.client||"", phone: o.phone||"",
          pack: o.pack||"", packId: "", extras: Array.isArray(o.extras)?o.extras:[],
          halte: o.halte||"", creneau: o.creneau||"",
          date: o.date||"", total: Number(o.total)||0, notes: o.notes||"",
          status: o.status||"new",
        }));
        setOrders(sheetsOrders);
        lsSet(SK_ORDERS, sheetsOrders);
        setLastSync(new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}));
        showToast(`✅ ${sheetsOrders.length} commandes synchronisées`,"green");
      } else {
        showToast("Aucune commande dans le Sheet","");
      }
    } catch(err) {
      console.warn("Sync error:", err);
      showToast("❌ Erreur sync — vérifiez l'URL du script","red");
    }
    setLoading(false);
  };

  // Mettre à jour le statut dans Google Sheets
  const updateSheetStatus = (id, status) => {
    if (!GOOGLE_SCRIPT_URL) return;
    fetch(`${GOOGLE_SCRIPT_URL}?action=updateStatus&id=${id}&status=${status}`)
      .catch(err => console.warn("Sheet status update:", err));
  };

  const active=orders.filter(o=>o.status!=="cancelled");
  const totalCA=active.reduce((s,o)=>s+o.total,0);
  const avgPan=active.length?Math.round(totalCA/active.length):0;
  const pending=orders.filter(o=>o.status==="new").length;
  const filtered=fstat==="all"?orders:orders.filter(o=>o.status===fstat);
  const todayDemo=orders.filter(o=>o.date==="2024-07-15");

  const setStatus=(id,st)=>{
    const order=orders.find(o=>o.id===id);
    if(st==="delivered"&&order&&order.status!=="delivered"){
      deductStock(order,stockState,setStockState);
    }
    setOrders(prev=>prev.map(o=>o.id===id?{...o,status:st}:o));
    updateSheetStatus(id, st);
  };

  const tournees={};
  todayDemo.filter(o=>o.status!=="cancelled").forEach(o=>{
    if(!tournees[o.creneau]) tournees[o.creneau]=[];
    tournees[o.creneau].push(o);
  });

  const addOrder=()=>{
    if(!newOrd.client||!newOrd.pack||!newOrd.halte||!newOrd.creneau) return;
    const p=PACKS.find(x=>x.label===newOrd.pack);
    const id=`CM${String(orders.length+1).padStart(3,"0")}`;
    setOrders(prev=>[...prev,{id,...newOrd,packId:p?p.id:"",extras:[],date:new Date().toISOString().slice(0,10),total:p?p.price:0,status:"new"}]);
    setNewOrd({client:"",phone:"",pack:"",packId:"",halte:"",creneau:""});
    showToast("✅ Commande ajoutée","green");
  };

  const waConfirm=o=>`${WA}?text=${encodeURIComponent(`Bonjour ${o.client}, votre commande ${o.id} est confirmée pour ${o.creneau} à ${o.halte}. 🛶`)}`;
  const SL={all:"Toutes",new:"Nouvelles",confirmed:"Confirmées",delivered:"Livrées",cancelled:"Annulées"};

  return (
    <div className="page">
      <div className="sec-head">
        <div><div className="sec-title">Back-office · Tableau de bord</div>
        <div className="sec-sub">Gestion des commandes{lastSync&&<span style={{color:"var(--green)",marginLeft:8}}>· Sync {lastSync}</span>}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={syncFromSheets} disabled={loading}
            style={{padding:"7px 16px",borderRadius:8,border:"1.5px solid var(--canal)",background:"transparent",color:"var(--canal)",fontFamily:"var(--fs)",fontSize:".8rem",cursor:"pointer",transition:"all .2s",opacity:loading?0.6:1}}>
            {loading?"⏳ Sync...":"🔄 Sync Google Sheets"}
          </button>
          <div className="bo-date">📅 {new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}</div>
        </div>
      </div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-lbl">Actives</div><div className="stat-val sv-blue">{active.length}</div></div>
        <div className="stat-card"><div className="stat-lbl">En attente</div><div className="stat-val sv-orange">{pending}</div></div>
        <div className="stat-card"><div className="stat-lbl">Livrées</div><div className="stat-val sv-green">{orders.filter(o=>o.status==="delivered").length}</div></div>
        <div className="stat-card"><div className="stat-lbl">CA total</div><div className="stat-val">{totalCA} €</div></div>
        <div className="stat-card"><div className="stat-lbl">Panier moyen</div><div className="stat-val sv-gold">{avgPan} €</div></div>
      </div>

      <div className="sec-title" style={{marginBottom:6}}>Tournées du jour</div>
      <div className="sec-sub" style={{marginBottom:16}}>Commandes groupées par créneau</div>
      {Object.keys(tournees).length===0
        ? <div className="empty-st"><div className="ico">🛶</div><div>Aucune tournée aujourd&apos;hui</div></div>

            <div className="tournee-card" key={cr}>

              {cmds.map(c=><div className="tournee-row" key={c.id}><span style={{fontWeight:500,color:"var(--dark)"}}>{c.halte}</span><span style={{color:"var(--muted)",fontSize:".73rem"}}>· {c.client} · {c.pack}</span></div>)}
              <div className="tournee-ttl">💰 {cmds.reduce((s,c)=>s+c.total,0)} € à encaisser</div>

          ))}</div>

      <div className="filter-bar">{Object.entries(SL).map(([s,l])=><button key={s} className={`f-btn${fstat===s?" active":""}`} onClick={()=>setFstat(s)}>{l}</button>)}</div>
      <div className="orders-table">
        <table>
          <thead><tr><th>Réf.</th><th>Client</th><th>Pack</th><th>Halte</th><th>Créneau</th><th>Total</th><th>Statut</th><th>Actions</th></tr></thead>
          <tbody>
            {filtered.length===0
              ? <tr><td colSpan={8} style={{textAlign:"center",padding:36,color:"var(--muted)"}}>Aucune commande</td></tr>
              : filtered.map(o=>(
                <tr key={o.id}>
                  <td><span className="ord-id">{o.id}</span></td>
                  <td><div style={{fontWeight:500}}>{o.client}</div><div style={{fontSize:".73rem",color:"var(--muted)"}}>{o.phone}</div></td>
                  <td><div>{o.pack}</div>{o.extras.length>0&&<div style={{fontSize:".7rem",color:"var(--muted)"}}>+{o.extras.join(", ")}</div>}</td>
                  <td>{o.halte}</td><td>{o.creneau}</td>
                  <td><strong>{o.total} €</strong></td>
                  <td><SBadge status={o.status}/></td>
                  <td>
                    <div className="acts">
                      {o.status==="new"       && <button className="act-btn ok" onClick={()=>setStatus(o.id,"confirmed")}>✓ Confirmer</button>}
                      {o.status==="confirmed" && <button className="act-btn ok" onClick={()=>setStatus(o.id,"delivered")} title="Marque livré et débite le stock automatiquement">📦 Livré ↓stock</button>}
                      {o.status!=="cancelled"&&o.status!=="delivered"&&<button className="act-btn del" onClick={()=>setStatus(o.id,"cancelled")}>✗</button>}
                      <a className="act-btn wa" href={waConfirm(o)} target="_blank" rel="noreferrer">WA</a>
                    </div>
                  </td>
                </tr>
              ))}
          </tbody>
        </table>
      </div>

      <div className="new-form">
        <div className="form-title">+ Saisir une commande manuellement</div>
        <div className="form-row">
          <div className="form-grp"><label className="form-lbl">Nom client</label><input className="form-ctrl" placeholder="M. Dupont" value={newOrd.client} onChange={e=>setNewOrd({...newOrd,client:e.target.value})}/></div>
          <div className="form-grp"><label className="form-lbl">Téléphone</label><input className="form-ctrl" placeholder="06 00 00 00 00" value={newOrd.phone} onChange={e=>setNewOrd({...newOrd,phone:e.target.value})}/></div>
        </div>
        <div className="form-row">
          <div className="form-grp"><label className="form-lbl">Pack</label>
            <select className="form-ctrl" value={newOrd.pack} onChange={e=>{const p=PACKS.find(x=>x.label===e.target.value);setNewOrd({...newOrd,pack:e.target.value,packId:p?p.id:""});}}>
              <option value="">Choisir un pack</option>{PACKS.map(p=><option key={p.id} value={p.label}>{p.label} — {p.price} €</option>)}</select></div>
          <div className="form-grp"><label className="form-lbl">Halte</label>
            <select className="form-ctrl" value={newOrd.halte} onChange={e=>setNewOrd({...newOrd,halte:e.target.value})}>
              <option value="">Choisir une halte</option>{HALTES.map(h=><option key={h}>{h}</option>)}</select></div>
        </div>
        <div className="form-row">
          <div className="form-grp"><label className="form-lbl">Créneau</label>
            <select className="form-ctrl" value={newOrd.creneau} onChange={e=>setNewOrd({...newOrd,creneau:e.target.value})}>
              <option value="">Choisir</option>{CRENEAUX.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="form-grp" style={{justifyContent:"flex-end"}}><button className="btn-dark" onClick={addOrder}>+ Ajouter</button></div>
        </div>
      </div>
    </div>
  );
}

//  STOCK
// ═══════════════════════════════════════════════════════
function Stock({stockState,setStockState}) {
  const {produits,mouvements,nextId}=stockState;
  const [mvType,setMvType]=useState("in");
  const [mvProd,setMvProd]=useState("");
  const [mvQty,setMvQty]=useState(1);
  const [mvNote,setMvNote]=useState("");
  const [hFilter,setHFilter]=useState("all");
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [mf,setMf]=useState({nom:"",cat:"Boissons",unite:"bouteille",stock:0,seuil:5});

  const upd=ns=>{ lsSet(SK_STOCK,ns); setStockState(ns); };

  const addMv=()=>{
    const pid=parseInt(mvProd), qty=parseInt(mvQty);
    if(!pid||!qty||qty<1){ showToast("Sélectionnez un produit et une quantité","red"); return; }
    const prod=produits.find(p=>p.id===pid);
    const newP=produits.map(p=>p.id!==pid?p:{...p,stock:mvType==="in"?p.stock+qty:Math.max(0,p.stock-qty)});
    const newMv=[{id:Date.now(),produit:prod.nom,unite:prod.unite,type:mvType,qty,note:mvNote,date:nowStr(),auto:false},...mouvements.slice(0,199)];
    upd({...stockState,produits:newP,mouvements:newMv});
    setMvProd(""); setMvQty(1); setMvNote("");
    showToast(mvType==="in"?`▲ +${qty} ${prod.nom}`:`▼ -${qty} ${prod.nom}`,"green");
  };

  const quickAdj=(id,delta)=>{
    const prod=produits.find(p=>p.id===id);
    if(!prod) return;
    const ns=Math.max(0,prod.stock+delta);
    const newP=produits.map(p=>p.id===id?{...p,stock:ns}:p);
    const newMv=[{id:Date.now(),produit:prod.nom,unite:prod.unite,type:delta>0?"in":"out",qty:Math.abs(delta),note:"Ajustement rapide",date:nowStr(),auto:false},...mouvements.slice(0,199)];
    upd({...stockState,produits:newP,mouvements:newMv});
  };

  const openModal=(id=null)=>{
    const p=id?produits.find(x=>x.id===id):null;
    setEditId(id);
    setMf(p?{nom:p.nom,cat:p.cat,unite:p.unite,stock:p.stock,seuil:p.seuil}:{nom:"",cat:"Boissons",unite:"bouteille",stock:0,seuil:5});
    setModal(true);
  };

  const saveModal=()=>{
    if(!mf.nom) return;
    const s=parseInt(mf.stock)||0, t=parseInt(mf.seuil)||0;
    const newP=editId
      ?produits.map(p=>p.id===editId?{...p,...mf,stock:s,seuil:t}:p)
      :[...produits,{id:nextId,...mf,stock:s,seuil:t}];
    upd({...stockState,produits:newP,nextId:editId?nextId:nextId+1});
    setModal(false);
    showToast(editId?"✏️ Produit modifié":"✅ Produit ajouté","green");
  };

  const delProd=(id)=>{
    const p=produits.find(x=>x.id===id);
    if(!confirm(`Supprimer "${p.nom}" ?`)) return;
    upd({...stockState,produits:produits.filter(x=>x.id!==id)});
  };

  const exportCSV=()=>{
    const rows=[["Produit","Catégorie","Unité","Stock","Seuil","État"],...produits.map(p=>[p.nom,p.cat,p.unite,p.stock,p.seuil,statusLabel(getStatus(p.stock,p.seuil)).replace(/[✅⚠️🔴]/g,"").trim()])];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));
    a.download=`stock-canal-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const hList=(hFilter==="all"?mouvements:mouvements.filter(m=>m.type===hFilter)).slice(0,50);
  const sorted=[...produits].sort((a,b)=>{const o={danger:0,warn:1,ok:2};return o[getStatus(a.stock,a.seuil)]-o[getStatus(b.stock,b.seuil)];});
  const CATS_S=["Boissons","Épicerie","Boulangerie","Charcuterie","Fromage","Hygiène","Emballage","Autre"];
  const UNITS =["bouteille","pièce","kg","litre","sachet","pot","barquette","paquet","plaquette","flacon","lot","rouleau"];

  return (
    <div className="page">
      <div className="sec-head">
        <div>
          <div className="sec-title">Gestion des stocks</div>
          <div className="sec-sub" style={{color:produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length?"var(--red)":"var(--muted)"}}>
            {produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length>0
              ? `⚠️ ${produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length} produit(s) en alerte`
              : "✅ Tous les stocks sont OK"}
          </div>
        </div>
      </div>

      <div className="stats-grid">
        <div className="stat-card"><div className="stat-lbl">Produits</div><div className="stat-val">{produits.length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Stock OK</div><div className="stat-val sv-green">{produits.filter(p=>getStatus(p.stock,p.seuil)==="ok").length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Stock bas</div><div className="stat-val sv-orange">{produits.filter(p=>getStatus(p.stock,p.seuil)==="warn").length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Rupture</div><div className="stat-val sv-red">{produits.filter(p=>getStatus(p.stock,p.seuil)==="danger").length}</div></div>
        <div className="stat-card"><div className="stat-lbl">Mouvements</div><div className="stat-val sv-gold">{mouvements.length}</div></div>
      </div>

      <div className="mv-form">
        <div className="sec-title" style={{marginBottom:4}}>Enregistrer un mouvement</div>
        <div className="sec-sub" style={{marginBottom:14}}>Entrée de stock ou sortie manuelle</div>
        <div className="mv-grid">
          <div className="form-grp">
            <label className="form-lbl">Produit</label>
            <select className="form-ctrl" value={mvProd} onChange={e=>setMvProd(e.target.value)}>
              <option value="">Choisir un produit…</option>
              {[...new Set(produits.map(p=>p.cat))].sort().map(cat=>(
                <optgroup key={cat} label={cat}>
                  {produits.filter(p=>p.cat===cat).map(p=><option key={p.id} value={p.id}>{p.nom} ({p.stock} {p.unite})</option>)}
                </optgroup>
              ))}
            </select>
          </div>
          <div className="form-grp"><label className="form-lbl">Quantité</label><input type="number" className="form-ctrl" min="1" value={mvQty} onChange={e=>setMvQty(e.target.value)}/></div>
          <div className="form-grp">
            <label className="form-lbl">Type</label>
            <div className="type-toggle">
              <button className={`type-btn${mvType==="in"?" ai":""}`} onClick={()=>setMvType("in")}>▲ Entrée</button>
              <button className={`type-btn${mvType==="out"?" ao":""}`} onClick={()=>setMvType("out")}>▼ Sortie</button>
            </div>
          </div>
          <button className="btn-dark" onClick={addMv}>Valider</button>
        </div>
        <div className="form-grp" style={{marginTop:11,maxWidth:380}}>
          <label className="form-lbl">Note (optionnel)</label>
          <input type="text" className="form-ctrl" placeholder="Ex: livraison Somail, réappro fournisseur…" value={mvNote} onChange={e=>setMvNote(e.target.value)}/>
        </div>
      </div>

      <div className="sec-head">
        <div className="sec-title">Stock actuel</div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-export" onClick={exportCSV}>⬇ CSV</button>
          <button className="btn-dashed" onClick={()=>openModal()}>+ Nouveau produit</button>
        </div>
      </div>
      <div className="orders-table" style={{marginBottom:28}}>
        <table>
          <thead><tr><th>Produit</th><th>Catégorie</th><th style={{textAlign:"center"}}>Stock</th><th style={{textAlign:"center"}}>Seuil</th><th>État</th><th></th></tr></thead>
          <tbody>
            {sorted.length===0
              ? <tr><td colSpan={6} style={{textAlign:"center",padding:36,color:"var(--muted)"}}>Aucun produit</td></tr>
              : sorted.map(p=>{
                  const st=getStatus(p.stock,p.seuil);
                  return (
                    <tr key={p.id}>
                      <td><div style={{fontWeight:500}}>{p.nom}</div><div style={{fontSize:".72rem",color:"var(--muted)"}}>{p.unite}</div></td>
                      <td>{p.cat}</td>
                      <td style={{textAlign:"center"}}>
                        <div className="qty-ctrl" style={{justifyContent:"center"}}>
                          <button className="qty-btn qbm" onClick={()=>quickAdj(p.id,-1)}>−</button>
                          <span className={`qty-num q${st}`}>{p.stock}</span>
                          <button className="qty-btn qbp" onClick={()=>quickAdj(p.id,+1)}>+</button>
                        </div>
                      </td>
                      <td style={{textAlign:"center",color:"var(--muted)",fontSize:".82rem"}}>{p.seuil}</td>
                      <td><span className={`sbadge sb-${st}`}>{statusLabel(st)}</span></td>
                      <td><div className="acts"><button className="btn-sm" onClick={()=>openModal(p.id)}>✏️</button><button className="btn-sm d" onClick={()=>delProd(p.id)}>✕</button></div></td>
                    </tr>
                  );
                })
            }
          </tbody>
        </table>
      </div>

      <div className="sec-head">
        <div className="sec-title">Historique</div>
        <div className="filter-bar">
          {["all","in","out"].map(f=><button key={f} className={`f-btn${hFilter===f?" active":""}`} onClick={()=>setHFilter(f)}>{{all:"Tous",in:"Entrées",out:"Sorties"}[f]}</button>)}
        </div>
      </div>
      <div className="histo-list">
        {hList.length===0
          ? <div className="empty-st">Aucun mouvement enregistré</div>
          : hList.map(m=>(
            <div className="histo-row" key={m.id}>
              <div className="histo-ico">{m.type==="in"?"📥":"📤"}</div>
              <div style={{flex:1}}>
                <div className="histo-prod">{m.produit}{m.auto&&<span className="auto-badge">AUTO</span>}</div>
                <div className="histo-date">{m.date}{m.note&&<span> · <span className="histo-note">{m.note}</span></span>}</div>
              </div>
              <div className={`histo-qty hq-${m.type}`}>{m.type==="in"?"+":"-"}{m.qty} {m.unite}</div>
            </div>
          ))
        }
      </div>

      {modal&&(
        <div className="overlay show" onClick={e=>{if(e.target.classList.contains("overlay"))setModal(false);}}>
          <div className="modal">
            <div className="modal-title">{editId?"Modifier le produit":"Nouveau produit"}</div>
            <div className="form-grp" style={{marginBottom:12}}><label className="form-lbl">Nom</label><input className="form-ctrl" placeholder="Ex: Rosé IGP 75cl" value={mf.nom} onChange={e=>setMf({...mf,nom:e.target.value})}/></div>
            <div className="modal-row" style={{marginBottom:12}}>
              <div className="form-grp"><label className="form-lbl">Catégorie</label><select className="form-ctrl" value={mf.cat} onChange={e=>setMf({...mf,cat:e.target.value})}>{CATS_S.map(c=><option key={c}>{c}</option>)}</select></div>
              <div className="form-grp"><label className="form-lbl">Unité</label><select className="form-ctrl" value={mf.unite} onChange={e=>setMf({...mf,unite:e.target.value})}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
            </div>
            <div className="modal-row">
              <div className="form-grp"><label className="form-lbl">Stock actuel</label><input type="number" className="form-ctrl" min="0" value={mf.stock} onChange={e=>setMf({...mf,stock:e.target.value})}/></div>
              <div className="form-grp"><label className="form-lbl">Seuil alerte</label><input type="number" className="form-ctrl" min="0" value={mf.seuil} onChange={e=>setMf({...mf,seuil:e.target.value})}/></div>
            </div>
            <div className="modal-btns">
              <button className="btn-cancel" onClick={()=>setModal(false)}>Annuler</button>
              <button className="btn-save"   onClick={saveModal}>Enregistrer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  // Photos des packs
  packPhotos: {

  },
  // Packs (prix modifiables)
  packPrices: {

    "ptitdej-s":22, "ptitdej-m":38, "ptitdej-l":65,
    "arrivee":45, "essentiel-s":29
  },
  // Haltes & créneaux
  haltes:   ["Le Somail","Argeliers","Ventenac-en-Minervois","Paraza","Roubia","Argens-Minervois","Homps","Azille","Olonzac","Capestang","Poilhes","Montady","Nissan-lez-Enserune","Colombiers","Béziers (port)","Villeneuve-lès-Béziers"],
  creneaux: ["08h–09h","09h–10h","10h–11h","16h–17h","17h–18h","18h–19h","19h–20h"],
  footerText: "Livraison dans l'heure · Canal du Midi · Le Somail → Béziers",
  secretQuestion: "Quel est le nom de votre bateau ?",
  secretAnswer: "",
};

function Config({onSave}) {
  const [cfg, setCfg]           = useState(() => lsGet(SK_CONFIG, DEFAULT_CONFIG));
  const [tab, setTab]           = useState("identite");
  const [newHalte, setNewHalte] = useState("");
  const [newCreneau, setNewCreneau] = useState("");
  const [newExtra, setNewExtra] = useState({ico:"🎁", label:"", price:0});
  const [extrasList, setExtrasList] = useState(() => lsGet("canal-extras-v1", EXTRAS));
  const [packsList, setPacksList]   = useState(() => lsGet("canal-packs-v1",  null));
  const [editPack, setEditPack] = useState(null); // pack en cours d edition
  const [editExtraIdx, setEditExtraIdx] = useState(null);
  const [pwd, setPwd] = useState({old:"", new1:"", new2:""});

  const applyColors = (c) => {
    if(c.colorDark)  document.documentElement.style.setProperty("--dark",  c.colorDark);
    if(c.colorGold)  document.documentElement.style.setProperty("--gold",  c.colorGold);
    if(c.colorCanal) document.documentElement.style.setProperty("--canal", c.colorCanal);
    if(c.colorOlive) document.documentElement.style.setProperty("--olive", c.colorOlive);
  };

  const save = (patch) => {
    const next = {...cfg, ...patch};
    setCfg(next);
    lsSet(SK_CONFIG, next);
    applyColors(next);
    saveConfigToDB(next);
    if(onSave) onSave(next);
    showToast("✅ Sauvegardé", "green");
  };

  const upd = (k,v) => setCfg(c => ({...c,[k]:v}));
  const updPrice = (id,v) => setCfg(c => ({...c, packPrices:{...c.packPrices,[id]:Number(v)}}));

  // Haltes
  const addHalte = () => { if(!newHalte.trim()) return; save({haltes:[...(cfg.haltes||HALTES), newHalte.trim()]}); setNewHalte(""); };
  const delHalte = (i) => save({haltes:(cfg.haltes||HALTES).filter((_,idx)=>idx!==i)});
  const editHalte = (i,v) => { const h=[...(cfg.haltes||HALTES)]; h[i]=v; setCfg(c=>({...c,haltes:h})); };
  const moveHalte = (i, dir) => { const h=[...(cfg.haltes||HALTES)]; const j=i+dir; if(j<0||j>=h.length) return; [h[i],h[j]]=[h[j],h[i]]; save({haltes:h}); };

  // Créneaux
  const addCreneau = () => { if(!newCreneau.trim()) return; save({creneaux:[...(cfg.creneaux||CRENEAUX), newCreneau.trim()]}); setNewCreneau(""); };
  const delCreneau = (i) => save({creneaux:(cfg.creneaux||CRENEAUX).filter((_,idx)=>idx!==i)});
  const editCreneau = (i,v) => { const c=[...(cfg.creneaux||CRENEAUX)]; c[i]=v; setCfg(s=>({...s,creneaux:c})); };
  const moveCreneau = (i, dir) => { const c=[...(cfg.creneaux||CRENEAUX)]; const j=i+dir; if(j<0||j>=c.length) return; [c[i],c[j]]=[c[j],c[i]]; save({creneaux:c}); };

  // Extras
  const saveExtras = (list) => { setExtrasList(list); lsSet("canal-extras-v1", list); showToast("✅ Extras sauvegardés","green"); };

    setPwd({old:"",new1:"",new2:""});

  // Reset config
  const resetConfig = () => {
    if(!confirm("Remettre tous les paramètres par défaut ?")) return;

    ["extras","➕ Extras"],

            ["colorDark",  "Couleur principale",  "Fond nav, boutons, textes foncés"],
            ["colorGold",  "Couleur dorée",        "Accents, prix, logo"],
            ["colorCanal", "Couleur canal",        "Liens, sélections, badges"],
            ["colorOlive", "Couleur olive",        "Hover, boutons secondaires"],
          ].map(([key,lbl,desc])=>(
            <div className="cfg-color-row" key={key}>
              <div style={{flex:1}}>
                <div style={{fontWeight:500,fontSize:".85rem"}}>{lbl}</div>
                <div style={{fontSize:".72rem",color:"var(--muted)"}}>{desc}</div>

                document.documentElement.style.setProperty(v,e.target.value);

              <input className="form-ctrl" value={cfg[key]||""} onChange={e=>{
                upd(key,e.target.value);

                document.documentElement.style.setProperty(v,e.target.value);

              <div className="preview-title">{cfg.heroTitle} <em style={{color:cfg.colorGold||"#c8a050"}}>{cfg.heroTitleEm}</em></div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{background:cfg.colorDark,color:"white",padding:"7px 16px",borderRadius:8,fontSize:".82rem"}}>Bouton</span>

              <span style={{background:cfg.colorCanal,color:"white",padding:"7px 16px",borderRadius:8,fontSize:".82rem"}}>Sélection</span>
              <span style={{color:cfg.colorGold,fontFamily:"var(--fd)",fontSize:"1.6rem",fontWeight:600}}>52 €</span>
            </div>
          </div>
          <button className="cfg-save-btn" onClick={()=>save(cfg)}>💾 Sauvegarder les couleurs</button>
        </div>
      </>)}

            const photo = ((cfg.packPhotos)||{})[id] || "";

                        const f=e.target.files[0]; if(!f) return;

          {(cfg.haltes||HALTES).map((h,i)=>(
            <div className="cfg-list-item" key={i}>
              <span style={{fontSize:".9rem",cursor:"grab",color:"var(--muted)"}}>⠿</span>
              <span style={{fontSize:"1rem"}}>📍</span>
              <input value={h} onChange={e=>editHalte(i,e.target.value)} onBlur={()=>save(cfg)} style={{flex:1}}/>
              <button onClick={()=>moveHalte(i,-1)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--muted)",fontSize:".9rem",padding:"2px 4px"}} disabled={i===0}>▲</button>
              <button onClick={()=>moveHalte(i,+1)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--muted)",fontSize:".9rem",padding:"2px 4px"}} disabled={i===(cfg.haltes||HALTES).length-1}>▼</button>
              <button className="cfg-del-btn" onClick={()=>delHalte(i)}>✕</button>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <input className="form-ctrl" placeholder="Nouvelle halte…" value={newHalte}
              onChange={e=>setNewHalte(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHalte()} style={{flex:1}}/>
            <button className="cfg-save-btn" style={{marginTop:0}} onClick={addHalte}>+ Ajouter</button>
          </div>
        </div>
      )}

      {/* ══ CRÉNEAUX ══ */}
      {tab==="creneaux" && (
        <div className="cfg-section">
          <div className="cfg-title">Créneaux de livraison</div>
          <div className="cfg-sub">Plages horaires proposées aux clients lors de la commande</div>
          {(cfg.creneaux||CRENEAUX).map((c,i)=>(
            <div className="cfg-list-item" key={i}>
              <span style={{fontSize:"1rem"}}>⏰</span>
              <input value={c} onChange={e=>editCreneau(i,e.target.value)} onBlur={()=>save(cfg)} style={{flex:1}}/>
              <button onClick={()=>moveCreneau(i,-1)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--muted)",fontSize:".9rem",padding:"2px 4px"}} disabled={i===0}>▲</button>
              <button onClick={()=>moveCreneau(i,+1)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--muted)",fontSize:".9rem",padding:"2px 4px"}} disabled={i===(cfg.creneaux||CRENEAUX).length-1}>▼</button>
              <button className="cfg-del-btn" onClick={()=>delCreneau(i)}>✕</button>
            </div>
          ))}
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <input className="form-ctrl" placeholder="Ex: 12h–13h" value={newCreneau}
              onChange={e=>setNewCreneau(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCreneau()} style={{flex:1}}/>
            <button className="cfg-save-btn" style={{marginTop:0}} onClick={addCreneau}>+ Ajouter</button>
          </div>
        </div>
      )}

      {/* ══ SÉCURITÉ ══ */}
      {tab==="securite" && (
        <div>
          <div className="cfg-section">
            <div className="cfg-title">🔐 Changer le mot de passe admin</div>
            <div className="cfg-sub">Protège l&apos;accès au back-office et à la config</div>
            <div className="form-grp" style={{marginBottom:13,maxWidth:320}}>
              <label className="form-lbl">Mot de passe actuel</label>
              <input className="form-ctrl" type="password" placeholder="••••••••"
                value={pwd.old} onChange={e=>setPwd(p=>({...p,old:e.target.value}))}/>
            </div>
            <div className="form-grp" style={{marginBottom:13,maxWidth:320}}>
              <label className="form-lbl">Nouveau mot de passe</label>
              <input className="form-ctrl" type="password" placeholder="••••••••"
                value={pwd.new1} onChange={e=>setPwd(p=>({...p,new1:e.target.value}))}/>
            </div>
            <div className="form-grp" style={{marginBottom:18,maxWidth:320}}>
              <label className="form-lbl">Confirmer le nouveau mot de passe</label>
              <input className="form-ctrl" type="password" placeholder="••••••••"
                value={pwd.new2} onChange={e=>setPwd(p=>({...p,new2:e.target.value}))}/>
            </div>
            <button className="cfg-save-btn" onClick={changePwd}>🔐 Changer le mot de passe</button>
          </div>

          <div className="cfg-section">
            <div className="cfg-title">❓ Question secrète</div>
            <div className="cfg-sub">Si vous oubliez votre mot de passe, répondez correctement à cette question pour accéder au site</div>
            <div className="form-grp" style={{marginBottom:13,maxWidth:400}}>
              <label className="form-lbl">Votre question secrète</label>
              <input className="form-ctrl" placeholder="Ex: Quel est le nom de votre bateau ?"
                value={cfg.secretQuestion||""} onChange={e=>upd("secretQuestion",e.target.value)}/>
            </div>
            <div className="form-grp" style={{marginBottom:18,maxWidth:400}}>
              <label className="form-lbl">La réponse (sensible à la casse)</label>
              <input className="form-ctrl" placeholder="Votre réponse secrète"
                value={cfg.secretAnswer||""} onChange={e=>upd("secretAnswer",e.target.value)}/>
            </div>
            <button className="cfg-save-btn" onClick={()=>save(cfg)}>💾 Sauvegarder la question secrète</button>
            <div style={{marginTop:12,padding:12,background:"rgba(184,150,90,.1)",borderRadius:8,fontSize:".78rem",color:"var(--gold)",border:"1px solid rgba(184,150,90,.2)"}}>
              💡 Sur la page de connexion, un bouton &quot;Mot de passe oublié ?&quot; permettra de vous connecter si vous répondez correctement.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Fonction pour récupérer la config active (utilisée par Catalogue)
const getConfig = () => {
  try { const d=localStorage.getItem(SK_CONFIG); return d?JSON.parse(d):DEFAULT_CONFIG; } catch(e){return DEFAULT_CONFIG;}
};

// ═══════════════════════════════════════════════════════
//  MOT DE PASSE ADMIN
// ═══════════════════════════════════════════════════════
const ADMIN_PASSWORD = "canal2025"; // ← changez ce mot de passe

function LoginModal({onSuccess, onCancel}) {
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState(false);

  const tryLogin = () => {
    const override = (() => { try { return localStorage.getItem("canal-pwd-override"); } catch(e){ return null; } })();
    const correct = override || ADMIN_PASSWORD;
    if (pwd === correct) { onSuccess(); setErr(false); }
    else { setErr(true); setPwd(""); }
  };

  return (
    <div className="overlay show" onClick={e=>{ if(e.target.classList.contains("overlay")) onCancel(); }}>
      <div className="modal">
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:"2rem",marginBottom:8}}>🔐</div>
          <div className="modal-title" style={{textAlign:"center"}}>Accès réservé</div>
          <div style={{fontSize:".82rem",color:"var(--muted)"}}>Back-office & Stock — usage interne uniquement</div>
        </div>
        <div className="form-grp" style={{marginBottom:14}}>
          <label className="form-lbl">Mot de passe</label>
          <input
            className="form-ctrl"
            type="password"
            placeholder="••••••••"
            value={pwd}
            onChange={e=>{ setPwd(e.target.value); setErr(false); }}
            onKeyDown={e=>e.key==="Enter"&&tryLogin()}
            autoFocus
            style={err?{borderColor:"var(--red)"}:{}}
          />
          {err && <div style={{fontSize:".75rem",color:"var(--red)",marginTop:4}}>Mot de passe incorrect</div>}
        </div>
        <div className="modal-btns">
          <button className="btn-cancel" onClick={onCancel}>Annuler</button>
          <button className="btn-save"   onClick={tryLogin}>Entrer</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════
function App() {
  const [view,     setView]      = useState("catalogue");
  const [lang,     setLang]      = useState(()=>localStorage.getItem("canal-lang")||"fr");
  const t = LANGS[lang] || LANGS.fr;
  const [isAdmin,  setIsAdmin]   = useState(()=>sessionStorage.getItem("canal-admin")==="1");
  const [showLogin,setShowLogin] = useState(false);
  const [pendingView,setPending] = useState(null);
  const [menuOpen, setMenuOpen]  = useState(false);
  const [stockState,setStockState]=useState(()=>lsGet(SK_STOCK,{produits:DEFAULT_STOCK_PRODUITS,mouvements:[],nextId:18}));
  const [appCfg, setAppCfg] = useState(()=>lsGet(SK_CONFIG, DEFAULT_CONFIG));

  // Charger la config depuis Supabase au démarrage
  useEffect(()=>{
    loadConfigFromDB().then(remoteConfig => {
      if (remoteConfig) {
        lsSet(SK_CONFIG, remoteConfig);
        setAppCfg(remoteConfig);
        if(remoteConfig.colorDark)  document.documentElement.style.setProperty("--dark",  remoteConfig.colorDark);
        if(remoteConfig.colorGold)  document.documentElement.style.setProperty("--gold",  remoteConfig.colorGold);
        if(remoteConfig.colorCanal) document.documentElement.style.setProperty("--canal", remoteConfig.colorCanal);
        if(remoteConfig.colorOlive) document.documentElement.style.setProperty("--olive", remoteConfig.colorOlive);
      }
    });
  }, []);
  const alerts=stockState.produits.filter(p=>getStatus(p.stock,p.seuil)!=="ok").length;

  // Accès admin via URL#admin (à bookmarker sur le téléphone)
  React.useEffect(()=>{
    const checkHash = () => {
      if(window.location.hash === "#admin" && !isAdmin) {
        setPending("backoffice");
        setShowLogin(true);
        window.history.replaceState(null, "", window.location.pathname);
      }
    };
    checkHash();
    window.addEventListener("hashchange", checkHash);
    return () => window.removeEventListener("hashchange", checkHash);
  }, [isAdmin]);

  const goAdmin = (target) => {
    if (isAdmin) { setView(target); }
    else { setPending(target); setShowLogin(true); }
  };

  const onLoginSuccess = () => {
    sessionStorage.setItem("canal-admin","1");
    setIsAdmin(true);
    setShowLogin(false);
    if (pendingView) { setView(pendingView); setPending(null); }
  };

  const logout = () => {
    sessionStorage.removeItem("canal-admin");
    setIsAdmin(false);
    setView("catalogue");
    showToast("Déconnecté","");
  };

  return (<>
    <nav className="nav">
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        {["fr","en","es"].map(l=>(
          <button key={l} onClick={()=>{setLang(l);localStorage.setItem("canal-lang",l);}}
            style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid",
              borderColor:lang===l?"var(--canal)":"var(--sand)",
              background:lang===l?"var(--canal)":"transparent",
              color:lang===l?"white":"var(--muted)",
              fontSize:".72rem",fontWeight:600,cursor:"pointer",transition:"all .2s",
              fontFamily:"var(--fs)"}}>
            {l==="fr"?"🇫🇷":l==="en"?"🇬🇧":"🇪🇸"}
          </button>
        ))}
      </div>
      <div className="nav-logo">
        <img src={(()=>{try{const c=JSON.parse(localStorage.getItem("canal-config-v1")||"{}");return c.logoUrl||LOGO_SM;}catch(e){return LOGO_SM;}})()}  alt="Lock & Dock Delivery"/>
        <div className="nav-logo-text">
          <span className="nav-logo-name">Lock &amp; Dock</span>
          <span className="nav-logo-sub">Delivery</span>
        </div>
      </div>
      <div className="nav-right">
        <div className="nav-search" onClick={()=>setView("catalogue")}>
          🔍 <span style={{fontSize:".8rem"}}>Rechercher...</span>
        </div>
        <button className="nav-cart" onClick={()=>setView("catalogue")}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        </button>
      </div>
      <div className="nav-tabs">
        <button className={`nav-tab${view==="catalogue"?" active":""}`} onClick={()=>setView("catalogue")}>
          🛒 Catalogue
        </button>
        {isAdmin&&(
          <div className="nav-tabs-admin">
            <button className={`nav-tab${view==="backoffice"?" active":""}`} onClick={()=>setView("backoffice")}>
              ⚙️ Back-office
            </button>
            <button className={`nav-tab${view==="config"?" active":""}`} onClick={()=>setView("config")}>
              ⚙️ Config
            </button>
            <button className="nav-tab" onClick={logout} style={{color:"var(--terra)",fontSize:".72rem"}}>
              Quitter ↩
            </button>
          </div>
        )}
        {isAdmin&&(
          <button className="nav-menu-btn" onClick={()=>setMenuOpen(!menuOpen)}>☰</button>
        )}
      </div>
      {isAdmin&&(
        <div className={`nav-drawer${menuOpen?" open":""}`}>
          <button className={`nav-tab${view==="backoffice"?" active":""}`} onClick={()=>{setView("backoffice");setMenuOpen(false);}}>
            ⚙️ Back-office
          </button>
          <button className={`nav-tab${view==="config"?" active":""}`} onClick={()=>{setView("config");setMenuOpen(false);}}>
            ⚙️ Config
          </button>
          <button className="nav-tab" onClick={()=>{logout();setMenuOpen(false);}} style={{color:"var(--terra)",fontSize:".72rem"}}>
            Quitter ↩
          </button>
        </div>
      )}
    </nav>

    {view==="catalogue"  && <Catalogue appCfg={appCfg} lang={lang} t={t} isAdmin={isAdmin} setPending={setPending} setShowLogin={setShowLogin}/>}
    {view==="backoffice" && isAdmin && <Backoffice stockState={stockState} setStockState={setStockState}/>}
    {view==="stock"      && isAdmin && <Stock      stockState={stockState} setStockState={setStockState}/>}
    {view==="config"     && isAdmin && <Config onSave={setAppCfg}/>}

    {showLogin && (
      <LoginModal
        onSuccess={onLoginSuccess}
        onCancel={()=>{ setShowLogin(false); setPending(null); }}
      />
    )}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
